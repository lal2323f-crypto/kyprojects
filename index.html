<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>速さ・年齢算 練習テスト</title>
<style>
  :root {
    --bg: #f7f9fc;
    --card: #ffffff;
    --primary: #2563eb;
    --primary-light: #dbeafe;
    --correct: #16a34a;
    --correct-light: #dcfce7;
    --wrong: #dc2626;
    --wrong-light: #fee2e2;
    --neutral: #64748b;
    --border: #e2e8f0;
    --text: #1e293b;
    --subtext: #475569;
    --radius: 10px;
    --shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 20px 16px 60px;
  }
  header { text-align: center; margin-bottom: 24px; }
  header .subject-label {
    display: inline-block;
    background: var(--primary);
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: .08em;
    padding: 3px 12px;
    border-radius: 20px;
    margin-bottom: 8px;
  }
  header h1 { font-size: 22px; font-weight: 800; color: var(--text); line-height: 1.3; }
  header p { font-size: 13px; color: var(--subtext); margin-top: 6px; }

  .progress-wrap {
    background: var(--card); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 14px 20px;
    margin-bottom: 20px; display: flex; align-items: center; gap: 14px;
  }
  .progress-text { font-size: 14px; font-weight: 700; color: var(--primary); white-space: nowrap; }
  .progress-bar-outer {
    flex: 1; height: 8px; background: var(--border);
    border-radius: 99px; overflow: hidden;
  }
  .progress-bar-inner {
    height: 100%; background: var(--primary);
    border-radius: 99px; transition: width .4s; width: 0%;
  }
  .cheer { font-size: 13px; color: var(--subtext); white-space: nowrap; }

  .quiz-section { max-width: 720px; margin: 0 auto; }

  .question-card {
    background: var(--card); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 22px 22px 18px;
    margin-bottom: 18px; border-left: 4px solid var(--primary);
  }
  .question-card.answered-correct { border-left-color: var(--correct); }
  .question-card.answered-wrong   { border-left-color: var(--wrong); }

  .q-number {
    font-size: 11px; font-weight: 800; letter-spacing: .1em;
    color: var(--primary); text-transform: uppercase; margin-bottom: 6px;
  }
  .question-card.answered-correct .q-number { color: var(--correct); }
  .question-card.answered-wrong   .q-number { color: var(--wrong); }

  .q-context {
    font-size: 14px; color: var(--subtext); background: #f1f5f9;
    border-radius: 6px; padding: 10px 14px; margin-bottom: 10px;
    line-height: 1.75; border-left: 3px solid #cbd5e1;
  }
  .q-text { font-size: 15px; font-weight: 600; line-height: 1.75; margin-bottom: 16px; }

  .frac {
    display: inline-flex; flex-direction: column; align-items: center;
    vertical-align: middle; margin: 0 2px; font-size: .9em; line-height: 1.1;
  }
  .frac span:first-child { border-bottom: 1.5px solid currentColor; padding-bottom: 1px; }
  .frac span:last-child  { padding-top: 1px; }

  .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  @media (max-width: 480px) { .choices { grid-template-columns: 1fr; } }

  .choice-btn {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; border: 1.5px solid var(--border);
    border-radius: 8px; background: #fff; cursor: pointer;
    font-size: 14px; font-weight: 500; color: var(--text);
    text-align: left; transition: border-color .15s, background .15s, color .15s;
    line-height: 1.5;
  }
  .choice-btn:hover:not(:disabled) {
    border-color: var(--primary); background: var(--primary-light);
  }
  .choice-btn .choice-label {
    display: inline-flex; align-items: center; justify-content: center;
    width: 24px; height: 24px; border-radius: 50%;
    background: #e2e8f0; color: var(--subtext);
    font-size: 12px; font-weight: 700; flex-shrink: 0;
    transition: background .15s, color .15s;
  }
  .choice-btn:hover:not(:disabled) .choice-label { background: var(--primary); color: #fff; }
  .choice-btn.correct { border-color: var(--correct); background: var(--correct-light); color: var(--correct); }
  .choice-btn.correct .choice-label { background: var(--correct); color: #fff; }
  .choice-btn.wrong   { border-color: var(--wrong);   background: var(--wrong-light);   color: var(--wrong); }
  .choice-btn.wrong   .choice-label { background: var(--wrong);   color: #fff; }
  .choice-btn:disabled { cursor: default; }

  .feedback { margin-top: 10px; font-size: 13px; font-weight: 600; display: none; }
  .feedback.correct { color: var(--correct); display: block; }
  .feedback.wrong   { color: var(--wrong);   display: block; }

  #result-box {
    display: none; background: var(--card); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 28px 24px; margin-bottom: 24px;
    text-align: center; max-width: 720px; margin-left: auto; margin-right: auto;
  }
  #result-box h2 { font-size: 20px; margin-bottom: 6px; }
  #result-box .score-big {
    font-size: 48px; font-weight: 900; color: var(--primary); line-height: 1.1; margin: 10px 0 6px;
  }
  #result-box .score-sub { font-size: 14px; color: var(--subtext); margin-bottom: 16px; }

  #wrong-list { max-width: 720px; margin: 0 auto 20px; display: none; }
  #wrong-list h3 { font-size: 15px; font-weight: 700; color: var(--wrong); margin-bottom: 10px; }
  .wrong-item {
    background: var(--card); border-radius: 8px; padding: 12px 16px;
    margin-bottom: 8px; border-left: 3px solid var(--wrong);
    font-size: 13px; line-height: 1.6;
  }
  .wrong-item .wi-q { font-weight: 600; margin-bottom: 4px; }
  .wrong-item .wi-a { color: var(--correct); }

  #record-section { max-width: 720px; margin: 0 auto 20px; }
  #record-section h3 { font-size: 15px; font-weight: 700; margin-bottom: 10px; }
  #record-table {
    width: 100%; border-collapse: collapse; font-size: 13px;
    background: var(--card); border-radius: var(--radius);
    overflow: hidden; box-shadow: var(--shadow);
  }
  #record-table th {
    background: var(--primary); color: #fff;
    padding: 8px 12px; font-weight: 700; text-align: center;
  }
  #record-table td { padding: 8px 12px; border-bottom: 1px solid var(--border); text-align: center; }
  #record-table tr:last-child td { border-bottom: none; }

  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 16px; }
  .btn {
    padding: 10px 22px; border-radius: 8px; border: none;
    font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity .15s;
  }
  .btn:hover { opacity: .85; }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-danger  { background: var(--wrong); color: #fff; }
  .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
</style>
</head>
<body>

<header>
  <div class="subject-label">数的推理</div>
  <h1>速さ・年齢算 練習テスト</h1>
  <p>選択肢を選ぶと、その場で採点されます。出題順は毎回ランダムです。</p>
</header>

<div class="progress-wrap">
  <span class="progress-text" id="prog-text">0 / 0</span>
  <div class="progress-bar-outer"><div class="progress-bar-inner" id="prog-bar"></div></div>
  <span class="cheer" id="cheer-text">がんばって！</span>
</div>

<div id="result-box">

  <div class="score-big" id="score-big">0／0</div>
  <div class="score-sub" id="score-sub"></div>
  <div class="btn-row">

    <button class="btn btn-outline" onclick="restartWrong()">間違えた問題のみもう一度</button>
  </div>
</div>

<div id="wrong-list">
  <h3>間違えた問題</h3>

</div>

<div class="quiz-section" id="quiz"></div>

<div id="record-section">

  <table id="record-table">
    <thead>

    </thead>
    <tbody id="record-body"></tbody>
  </table>
  <div class="btn-row" style="margin-top:12px">
    <button class="btn btn-danger" onclick="clearRecord()">記録をリセット</button>
  </div>
</div>

    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function init(qList) {
  questions = qList;
  answered = {};
  document.getElementById("prog-bar").style.width = "0%";
  document.getElementById("prog-text").textContent = "0 / " + qList.length;
  document.getElementById("cheer-text").textContent = "がんばって！";
  renderQuiz();
}

function restartAll() {
  document.getElementById("result-box").style.display = "none";
  document.getElementById("wrong-list").style.display = "none";
  wrongIds = new Set();
  isAllMode = true;
  init(shuffle([...QUESTIONS_MASTER]));
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function restartWrong() {
  if (wrongIds.size === 0) { alert("間違えた問題はありません！"); return; }
  const wrongQs = QUESTIONS_MASTER.filter(q => wrongIds.has(q.id));
  document.getElementById("result-box").style.display = "none";
  document.getElementById("wrong-list").style.display = "none";
  wrongIds = new Set();
  isAllMode = false;
  init(shuffle(wrongQs));
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function renderQuiz() {
  const container = document.getElementById("quiz");
  container.innerHTML = "";
  questions.forEach((q, idx) => {
    const card = document.createElement("div");
    card.className = "question-card";
    card.id = "card-" + q.id;

    let html = `<div class="q-number">問 ${idx + 1}</div>`;
    if (q.context) html += `<div class="q-context">${q.context}</div>`;
    html += `<div class="q-text">${q.text}</div>`;
    html += `<div class="choices" id="choices-${q.id}">`;
    q.choices.forEach((c, ci) => {
      html += `<button class="choice-btn" id="btn-${q.id}-${ci}"
        onclick="selectAnswer('${q.id}', ${ci})">
        <span class="choice-label">${String.fromCharCode(65 + ci)}</span>${c}</button>`;
    });
    html += `</div><div class="feedback" id="fb-${q.id}"></div>`;
    card.innerHTML = html;
    container.appendChild(card);
  });
}

function selectAnswer(qid, chosen) {
  if (answered[qid] !== undefined) return;
  const q = questions.find(x => x.id === qid);
  const correct = q.answer;
  answered[qid] = chosen;

  const card = document.getElementById("card-" + qid);
  const fb = document.getElementById("fb-" + qid);
  const isCorrect = (chosen === correct);

  q.choices.forEach((_, ci) => {
    const btn = document.getElementById(`btn-${qid}-${ci}`);
    btn.disabled = true;
    if (ci === correct) btn.classList.add("correct");
    if (ci === chosen && !isCorrect) btn.classList.add("wrong");
  });

  if (isCorrect) {
    card.classList.add("answered-correct");
    fb.className = "feedback correct";
    fb.textContent = "✓ 正解！";
  } else {
    card.classList.add("answered-wrong");
    fb.className = "feedback wrong";
    fb.textContent = "✗ 不正解。正解は「" + q.choices[correct] + "」";
    wrongIds.add(qid);
  }

  updateProgress();
  checkAllDone();
}

function updateProgress() {
  const done = Object.keys(answered).length;
  const total = questions.length;
  document.getElementById("prog-text").textContent = done + " / " + total;
  document.getElementById("prog-bar").style.width = (total ? done / total * 100 : 0) + "%";
  let cheer = "がんばって！";
  if (done === total && total > 0) cheer = "全問解答完了！";
  else if (done / total >= 0.8) cheer = "もう少し！";
  else if (done / total >= 0.5) cheer = "折り返し！";
  else if (done / total >= 0.2) cheer = "いい調子！";
  document.getElementById("cheer-text").textContent = cheer;
}

function checkAllDone() {
  if (Object.keys(answered).length < questions.length) return;
  const correctCount = questions.filter(q => answered[q.id] === q.answer).length;
  const total = questions.length;
  const pct = Math.round(correctCount / total * 100);

  const rb = document.getElementById("result-box");
  rb.style.display = "block";
  document.getElementById("score-big").textContent = correctCount + "／" + total;
  document.getElementById("score-sub").textContent = "正答率 " + pct + "%";

  if (wrongIds.size > 0) {
    const wl = document.getElementById("wrong-list");
    const wi = document.getElementById("wrong-items");
    wi.innerHTML = "";
    wrongIds.forEach(id => {
      const q = QUESTIONS_MASTER.find(x => x.id === id);
      if (!q) return;
      const div = document.createElement("div");
      div.className = "wrong-item";
      div.innerHTML = `<div class="wi-q">${q.text}</div><div class="wi-a">正解：${q.choices[q.answer]}</div>`;
      wi.appendChild(div);
    });
    wl.style.display = "block";
    // 間違い一覧の少し上（result-boxの先頭）にスクロール
    setTimeout(() => rb.scrollIntoView({ behavior: "smooth", block: "start" }), 50);
  } else {
    // 全問正解の場合は result-box へスクロール
    setTimeout(() => rb.scrollIntoView({ behavior: "smooth", block: "center" }), 50);
  }

  if (isAllMode) saveRecord(correctCount, total, pct);
}

function saveRecord(correct, total, pct) {
  let records = [];
  try { records = JSON.parse(localStorage.getItem("mathQuizRecords") || "[]"); } catch(e) {}
  records.push({ date: new Date().toLocaleDateString("ja-JP"), correct, total, pct });
  try { localStorage.setItem("mathQuizRecords", JSON.stringify(records)); } catch(e) {}
  renderRecord();
}

function renderRecord() {
  let records = [];
  try { records = JSON.parse(localStorage.getItem("mathQuizRecords") || "[]"); } catch(e) {}
  const tbody = document.getElementById("record-body");
  tbody.innerHTML = "";
  records.forEach((r, i) => {
    const prev = i > 0 ? records[i - 1] : null;
    const diff = prev ? (r.pct - prev.pct) : null;
    const diffStr = diff === null ? "—" : diff > 0 ? "▲" + diff + "%" : diff < 0 ? "▼" + Math.abs(diff) + "%" : "±0%";
    const diffColor = diff > 0 ? "color:#16a34a" : diff < 0 ? "color:#dc2626" : "";
    tbody.innerHTML += `<tr>
      <td>${i + 1}</td><td>${r.date}</td>
      <td>${r.correct}／${r.total}</td><td>${r.pct}%</td>
      <td style="${diffColor}">${diffStr}</td></tr>`;
  });
}

function clearRecord() {
  if (!confirm("記録をリセットしますか？")) return;
  try { localStorage.removeItem("mathQuizRecords"); } catch(e) {}
  renderRecord();
}

window.onload = () => { renderRecord(); restartAll(); };
</script>

</html>
