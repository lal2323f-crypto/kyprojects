<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="勉強計画">
<meta name="format-detection" content="telephone=no,date=no">
<meta name="description" content="テスト・検定までの残り日数、時間割形式の勉強計画、月間の勉強結果ヒートマップをまとめた学習管理アプリ。">
<title>勉強計画アプリ</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    color-scheme: dark;
    --bg: #0a0a14;
    --surface: #15151f;
    --surface-2: #20203a;
    --primary: #a855f7;
    --primary-soft: #c084fc;
    --primary-btn-a: #9333ea;
    --primary-btn-b: #7c3aed;
    --primary-dark: #7c3aed;
    --accent: #fbbf24;
    --text: #f2f0fa;
    --text-sub: #a39cc0;
    --border: rgba(255,255,255,0.10);
    --tab-active: #c084fc;
    --tab-inactive: #6b6486;
    --slot-empty: #1c1c2c;
    --slot-filled: rgba(168,85,247,0.16);
    --slot-filled-border: #a855f7;
    --delete: #fb7185;
    --delete-rgb: 251,113,133;
    --accent-text: #fbbf24;
    --ink-dark: #1a1030;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.03) inset;
    --shadow-md: 0 10px 30px rgba(0,0,0,0.55), 0 0 24px rgba(168,85,247,0.12);
    --shadow-lg: 0 20px 50px rgba(0,0,0,0.6), 0 0 40px rgba(168,85,247,0.20);
    /* 勉強結果ヒートマップ用シーケンシャル配色（紫1色・暗→明、ダーク面用に反転） */
    --seq-100: #241f38;
    --seq-250: #3f2f6b;
    --seq-400: #7c3aed;
    --seq-600: #c084fc;
  }

  @keyframes tabIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes shake {
    10%, 90% { transform: translateX(-1px); }
    20%, 80% { transform: translateX(2px); }
    30%, 50%, 70% { transform: translateX(-4px); }
    40%, 60% { transform: translateX(4px); }
  }

  @keyframes toastIn {
    from { opacity: 0; transform: translate(-50%, 10px); }
    to { opacity: 1; transform: translate(-50%, 0); }
  }

  body {
    font-family: 'Hiragino Sans', 'Meiryo', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    max-width: 480px;
    margin: 0 auto;
    position: relative;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* 星空の背景（固定・スクロールに追従しない） */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background-repeat: repeat-y;
    background-size: 100% 620px;
    background-image:
      radial-gradient(1.4px 1.4px at 8% 10%, rgba(255,255,255,0.85), transparent 100%),
      radial-gradient(1px 1px at 22% 34%, rgba(255,255,255,0.6), transparent 100%),
      radial-gradient(1.6px 1.6px at 33% 6%, rgba(255,255,255,0.55), transparent 100%),
      radial-gradient(1px 1px at 47% 52%, rgba(255,255,255,0.75), transparent 100%),
      radial-gradient(1.6px 1.6px at 61% 20%, rgba(255,255,255,0.5), transparent 100%),
      radial-gradient(1px 1px at 73% 64%, rgba(255,255,255,0.65), transparent 100%),
      radial-gradient(1.6px 1.6px at 86% 14%, rgba(255,255,255,0.55), transparent 100%),
      radial-gradient(1px 1px at 93% 46%, rgba(255,255,255,0.75), transparent 100%),
      radial-gradient(1.6px 1.6px at 15% 76%, rgba(255,255,255,0.5), transparent 100%),
      radial-gradient(1px 1px at 41% 86%, rgba(255,255,255,0.6), transparent 100%),
      radial-gradient(1.6px 1.6px at 57% 94%, rgba(255,255,255,0.5), transparent 100%),
      radial-gradient(1px 1px at 79% 90%, rgba(255,255,255,0.65), transparent 100%),
      radial-gradient(2px 2px at 27% 24%, rgba(255,255,255,0.4), transparent 100%),
      radial-gradient(2px 2px at 68% 40%, rgba(255,255,255,0.4), transparent 100%);
  }
  /* 紫のグロー光源 */
  body::after {
    content: '';
    position: absolute;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background:
      radial-gradient(360px 300px at 15% -4%, rgba(168,85,247,0.30), transparent 70%),
      radial-gradient(300px 280px at 95% 14%, rgba(99,102,241,0.18), transparent 70%),
      radial-gradient(280px 260px at 10% 78%, rgba(192,132,252,0.10), transparent 70%);
  }

  /* ── ヘッダー ── */
  #app-header {
    background: linear-gradient(135deg, rgba(168,85,247,0.22) 0%, rgba(124,58,237,0.10) 100%);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    color: var(--text);
    padding: calc(12px + env(safe-area-inset-top, 0px)) 18px 12px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 3px;
    position: relative;
    z-index: 2;
  }

  .header-eyebrow {
    font-size: 0.6rem;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--text-sub);
    font-weight: 700;
  }

  .header-title {
    font-size: 1.05rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 9px;
  }

  .header-title-main {
    display: flex;
    align-items: center;
    gap: 9px;
    min-width: 0;
  }

  .header-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    font-size: 0.95rem;
    flex-shrink: 0;
    background: radial-gradient(circle at 32% 28%, rgba(255,255,255,0.3), transparent 60%), rgba(168,85,247,0.18);
    box-shadow: 0 0 14px rgba(168,85,247,0.55), inset 0 0 6px rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.15);
  }

  .streak-chip {
    display: flex;
    align-items: center;
    gap: 3px;
    font-size: 0.85rem;
    font-weight: 800;
    letter-spacing: 0;
    background: rgba(251,191,36,0.16);
    border: 1px solid rgba(251,191,36,0.4);
    color: var(--accent);
    padding: 3px 10px 3px 8px;
    border-radius: 999px;
    box-shadow: 0 0 12px rgba(251,191,36,0.3);
    flex-shrink: 0;
  }

  /* ── コンテンツ ── */
  #content {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 16px 14px 12px;
    position: relative;
    z-index: 1;
  }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; animation: tabIn 0.22s ease; }

  /* ── セクションカード ── */
  .card {
    background: var(--surface);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 14px;
    box-shadow: var(--shadow-sm);
    border: 1px solid rgba(255,255,255,0.07);
  }

  .card-title {
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--text-sub);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
  }

  .card-title::before {
    content: '';
    display: inline-block;
    width: 6px;
    height: 6px;
    margin-right: 7px;
    background: var(--primary);
    box-shadow: 0 0 8px var(--primary);
    border-radius: 1px;
    flex-shrink: 0;
  }

  /* ── 入力フォーム ── */
  .form-row {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 10px;
  }

  .form-row label {
    font-size: 0.82rem;
    color: var(--text-sub);
    font-weight: 600;
  }

  .form-row input {
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    font-size: 0.95rem;
    font-family: inherit;
    color: var(--text);
    background: var(--slot-empty);
    outline: none;
    transition: border 0.18s, background 0.18s;
  }

  .form-row input:focus {
    border-color: var(--primary);
    background-color: var(--surface-2);
    box-shadow: 0 0 0 3px rgba(168,85,247,0.18);
  }

  .form-row input.invalid {
    border-color: var(--delete);
    animation: shake 0.4s;
  }

  .btn {
    background: linear-gradient(135deg, var(--primary-btn-a), var(--primary-btn-b));
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px 18px;
    font-size: 0.93rem;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(147,51,234,0.35);
    transition: filter 0.16s, transform 0.1s, box-shadow 0.16s;
  }
  .btn:active { filter: brightness(0.88); transform: scale(0.97); box-shadow: none; }

  /* ── テストリスト ── */
  .exam-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px;
    background: var(--slot-empty);
    border-radius: 10px;
    margin-bottom: 8px;
    border: 1.5px solid var(--border);
    border-left: 4px solid var(--primary);
    transition: transform 0.1s;
  }
  .exam-item:active { transform: scale(0.99); }

  .exam-item.urgency-soon { border-left-color: var(--accent); }
  .exam-item.urgency-urgent { border-left-color: var(--delete); }

  .exam-name {
    font-weight: 700;
    font-size: 0.97rem;
    color: var(--text);
  }

  .exam-date {
    font-size: 0.8rem;
    color: var(--text-sub);
    margin-top: 2px;
  }

  .exam-days {
    font-size: 1.1rem;
    font-weight: 800;
    color: var(--primary-soft);
    text-align: right;
    min-width: 64px;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 3px;
  }

  .exam-item.urgency-soon .exam-days { color: var(--accent-text); }
  .exam-item.urgency-urgent .exam-days { color: var(--delete); }

  .exam-days span {
    display: block;
    font-size: 0.72rem;
    font-weight: 400;
    color: var(--text-sub);
  }

  .btn-delete {
    background: none;
    border: none;
    color: var(--delete);
    font-size: 1.1rem;
    cursor: pointer;
    padding: 4px 6px;
    margin-left: 8px;
    border-radius: 6px;
    transition: background 0.12s, transform 0.1s;
  }
  .btn-delete:active { background: rgba(var(--delete-rgb),0.16); transform: scale(0.9); }

  /* ── 勉強計画 ── */
  .plan-date-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .plan-date-nav button {
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 1rem;
    cursor: pointer;
    color: var(--primary-soft);
    transition: transform 0.1s, background 0.12s;
  }
  .plan-date-nav button:active { background: var(--slot-empty); transform: scale(0.92); }

  .plan-date-label {
    font-size: 0.97rem;
    font-weight: 700;
    color: var(--text);
  }

  /* タイムスロット */
  .time-slot {
    display: flex;
    align-items: stretch;
    margin-bottom: 5px;
    gap: 8px;
  }

  .time-slot.is-now .slot-block { border-left-color: var(--delete); }
  .time-slot.is-now .slot-block-time { color: var(--delete); font-weight: 700; }

  /* 連続する同じ内容のコマを1つのカードにまとめた表示（残り日数のカードと同じ見た目） */
  .slot-block {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    background: var(--slot-filled);
    border: 1.5px solid var(--border);
    border-left: 4px solid var(--primary);
    border-radius: 10px;
    padding: 12px 10px 12px 14px;
    cursor: pointer;
    box-shadow: 0 0 14px rgba(168,85,247,0.15);
    transition: transform 0.1s, background 0.12s;
  }
  .slot-block:active { transform: scale(0.98); }
  .slot-block:focus-visible { outline: 2px solid var(--primary); outline-offset: 1px; }

  .slot-block-main { min-width: 0; }

  .slot-block-title {
    font-size: 0.97rem;
    font-weight: 700;
    color: var(--text);
    word-break: break-word;
  }

  .slot-block-time {
    font-size: 0.8rem;
    color: var(--text-sub);
    margin-top: 2px;
    font-variant-numeric: tabular-nums;
  }

  .slot-block-delete {
    background: none;
    border: none;
    color: var(--text-sub);
    font-size: 0.95rem;
    cursor: pointer;
    padding: 4px 7px;
    border-radius: 6px;
    flex-shrink: 0;
    transition: background 0.12s, color 0.12s, transform 0.1s;
  }
  .slot-block-delete:hover { background: rgba(var(--delete-rgb),0.18); color: var(--delete); }
  .slot-block-delete:active { transform: scale(0.85); }

  .slot-block-edit {
    flex: 1;
    border: none;
    outline: none;
    background: transparent;
    font-size: 0.97rem;
    font-weight: 700;
    color: var(--text);
    font-family: inherit;
    min-width: 0;
    padding: 0;
  }

  /* ── 勉強結果 ── */
  .result-summary {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
  }

  .result-box {
    flex: 1;
    background: var(--slot-filled);
    border-radius: 12px;
    padding: 14px 10px;
    text-align: center;
    border: 1.5px solid var(--slot-filled-border);
  }

  .result-box .val {
    font-size: 1.6rem;
    font-weight: 800;
    color: var(--primary-soft);
    text-shadow: 0 0 18px rgba(168,85,247,0.5);
  }

  .result-box .lbl {
    font-size: 0.75rem;
    color: var(--text-sub);
    margin-top: 2px;
  }

  /* ── 実績バッジ ── */
  .badge-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    margin-bottom: 10px;
  }

  .badge-cell {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.35rem;
    border-radius: 12px;
    cursor: pointer;
    background: var(--slot-empty);
    border: 1.5px solid var(--border);
    color: var(--text);
    transition: transform 0.1s, box-shadow 0.15s;
  }
  .badge-cell:active { transform: scale(0.92); }

  .badge-cell.earned {
    background: linear-gradient(160deg, rgba(168,85,247,0.28), rgba(192,132,252,0.10));
    border-color: var(--primary);
    box-shadow: 0 0 14px rgba(168,85,247,0.4);
  }

  .badge-cell.locked {
    opacity: 0.32;
    filter: grayscale(1);
  }

  /* 月セレクタ */
  .month-selector {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .month-selector button {
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 5px 10px;
    font-size: 1rem;
    cursor: pointer;
    color: var(--primary-soft);
    transition: transform 0.1s, background 0.12s;
  }
  .month-selector button:active { background: var(--slot-empty); transform: scale(0.92); }

  .month-label {
    font-size: 0.97rem;
    font-weight: 700;
    color: var(--text);
  }

  /* ── 勉強結果：ヒートマップ・カレンダー ── */
  .cal-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
    gap: 8px;
  }

  .cal-legend {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.7rem;
    color: var(--text-sub);
  }

  .cal-legend-swatches {
    display: flex;
    gap: 3px;
  }

  .cal-legend-swatch {
    width: 12px;
    height: 12px;
    border-radius: 3px;
    border: 1px solid rgba(255,255,255,0.15);
  }

  .cal-toggle-btn {
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 5px 10px;
    font-size: 0.74rem;
    font-weight: 700;
    color: var(--primary-soft);
    cursor: pointer;
    white-space: nowrap;
    transition: transform 0.1s, background 0.12s;
  }
  .cal-toggle-btn:active { background: var(--slot-empty); transform: scale(0.95); }

  .cal-weekdays, .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }

  .cal-weekdays { margin-bottom: 6px; }

  .cal-weekday {
    text-align: center;
    font-size: 0.68rem;
    font-weight: 700;
    color: var(--text-sub);
  }

  .cal-cell {
    position: relative;
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: inherit;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: var(--slot-empty);
    color: var(--text);
    cursor: pointer;
    padding: 2px;
    transition: transform 0.1s, outline-color 0.1s;
  }

  .cal-cell:hover, .cal-cell:focus-visible {
    outline: 2px solid var(--primary);
    outline-offset: 1px;
    z-index: 1;
  }

  .cal-cell:active { transform: scale(0.93); }

  .cal-cell.is-blank {
    visibility: hidden;
    pointer-events: none;
    border: none;
    background: none;
  }

  .cal-cell.is-today { box-shadow: 0 0 0 2px var(--accent) inset; }

  .cal-cell.bucket-1 { background: var(--seq-100); border-color: var(--seq-100); color: var(--text); }
  .cal-cell.bucket-2 { background: var(--seq-250); border-color: var(--seq-250); color: var(--text); }
  .cal-cell.bucket-3 { background: var(--seq-400); border-color: var(--seq-400); color: var(--text); font-weight: 800; }
  .cal-cell.bucket-4 { background: var(--seq-600); border-color: var(--seq-600); color: var(--ink-dark); box-shadow: 0 0 12px rgba(192,132,252,0.5); }

  .cal-day {
    font-size: 0.7rem;
    font-weight: 700;
    line-height: 1.1;
  }

  .cal-hours {
    font-size: 0.6rem;
    font-weight: 700;
    margin-top: 1px;
    font-variant-numeric: tabular-nums;
  }

  .cal-detail {
    min-height: 20px;
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--text);
    background: var(--slot-empty);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    margin-top: 10px;
    margin-bottom: 4px;
  }

  .cal-detail-empty {
    text-align: center;
    color: var(--text-sub);
    font-weight: 400;
  }

  .cal-detail-title {
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
  }

  .cal-detail-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 5px 0;
    border-top: 1px solid var(--border);
    font-size: 0.82rem;
  }
  .cal-detail-row:first-child { border-top: none; }

  .cal-detail-name {
    color: var(--text-sub);
    font-weight: 600;
    word-break: break-word;
  }

  .cal-detail-mins {
    color: var(--primary-soft);
    font-weight: 700;
    flex-shrink: 0;
    font-variant-numeric: tabular-nums;
  }

  #badge-detail { text-align: center; }

  .result-table-wrap { display: none; }
  .result-table-wrap.show { display: block; }

  .result-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
  }

  .result-table th, .result-table td {
    padding: 8px 6px;
    border-bottom: 1px solid var(--border);
    text-align: left;
  }

  .result-table th {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--text-sub);
  }

  .result-table td.num, .result-table th.num {
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  /* ── ボトムナビ ── */
  #bottom-nav {
    display: flex;
    background: rgba(21,21,31,0.88);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-top: 1px solid rgba(255,255,255,0.08);
    flex-shrink: 0;
    padding-bottom: env(safe-area-inset-bottom, 0px);
    box-shadow: 0 -8px 24px rgba(0,0,0,0.35);
    position: relative;
    z-index: 1;
  }

  .nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 8px 4px 6px;
    margin: 6px 5px;
    background: none;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    gap: 2px;

    font-size: 0.72rem;

  .nav-btn:active { transform: scale(0.94); }
  .nav-btn.active {

  .nav-icon {
    font-size: 1.45rem;
    line-height: 1;
    transition: transform 0.15s;
  }

  .nav-btn.active .nav-icon { transform: translateY(-1px); }

  .empty-msg {
    text-align: center;
    color: var(--text-sub);
    font-size: 0.88rem;

  /* ── トースト ── */
  #toast {
    position: fixed;
    left: 50%;
    bottom: 90px;
    transform: translate(-50%, 10px);
    background: var(--surface-2);

    max-width: 88%;
    text-align: center;

  }
  #toast.show {
    opacity: 1;
    transform: translate(-50%, 0);
    animation: toastIn 0.2s ease;
  }
</style>
</head>
<body>

<div id="app-header">
  <div class="header-eyebrow">STUDY · PLANNER</div>
  <div class="header-title">
    <span class="header-title-main"><span class="header-badge">📚</span>勉強計画アプリ</span>
    <span class="streak-chip" id="streak-chip" style="display:none">🔥<span id="streak-count">0</span></span>
  </div>
</div>

<div id="content">

  <!-- ① 残り日数 -->
  <div id="tab-days" class="tab-panel active">
    <div class="card">
      <div class="card-title">テスト・検定を登録</div>
      <div class="form-row">
        <label>テスト・検定名</label>
        <input type="text" id="exam-name" placeholder="例：英検2級、数学中間テスト">
      </div>
      <div class="form-row">
        <label>実施日</label>
        <input type="date" id="exam-date">
      </div>
      <button class="btn" onclick="addExam()">登録する</button>
    </div>

    <div class="card">
      <div class="card-title">登録済みのテスト・検定</div>
      <div id="exam-list"><div class="empty-msg">まだ登録がありません</div></div>
    </div>
  </div>

  <!-- 2 勉強計画 -->
  <div id="tab-plan" class="tab-panel">
    <div class="card">
      <div class="plan-date-nav">
        <button onclick="changeDay(-1)">&#65308;</button>
        <div class="plan-date-label" id="plan-date-label"></div>
        <button onclick="changeDay(1)">&#65310;</button>
      </div>
      <div style="display:flex;gap:8px;align-items:flex-end;margin-bottom:14px;flex-wrap:wrap;">
        <div class="form-row" style="flex:1;min-width:88px;margin-bottom:0">
          <label>開始時間</label>
          <input type="text" id="plan-start" inputmode="numeric" maxlength="5" placeholder="06:00" value="06:00" oninput="formatTimeInput(this)">
        </div>
        <div class="form-row" style="flex:1;min-width:88px;margin-bottom:0">
          <label>終了時間</label>
          <input type="text" id="plan-end" inputmode="numeric" maxlength="5" placeholder="06:30" value="06:30" oninput="formatTimeInput(this)">
        </div>
        <div class="form-row" style="flex:2;min-width:120px;margin-bottom:0">
          <label>内容</label>
          <input type="text" id="plan-content" placeholder="例：英語リスニング">
        </div>
        <button class="btn" onclick="addPlanBlock()" style="white-space:nowrap;padding:8px 14px;">追加</button>
      </div>
      <div id="time-slots"></div>
    </div>
  </div>

  <!-- ③ 勉強結果 -->
  <div id="tab-result" class="tab-panel">
    <div class="card">
      <div class="month-selector">
        <button onclick="changeMonth(-1)">＜</button>
        <div class="month-label" id="result-month-label"></div>
        <button onclick="changeMonth(1)">＞</button>
      </div>
      <div class="result-summary">
        <div class="result-box">
          <div class="val" id="month-total-h">0</div>
          <div class="lbl">今月の合計時間(h)</div>
        </div>
        <div class="result-box">
          <div class="val" id="month-total-days">0</div>
          <div class="lbl">学習日数</div>
        </div>
      </div>
      <div id="result-detail-wrap">
        <div class="cal-toolbar">
          <div class="card-title" style="margin-bottom:0">日別の勉強時間</div>
          <button class="cal-toggle-btn" id="result-view-toggle" onclick="toggleResultView()">表を見る</button>
        </div>
        <div class="cal-toolbar" id="cal-legend-row" style="margin-top:-4px">
          <span></span>
          <div class="cal-legend">
            少ない
            <div class="cal-legend-swatches">
              <div class="cal-legend-swatch" style="background:var(--slot-empty)"></div>
              <div class="cal-legend-swatch" style="background:var(--seq-100)"></div>
              <div class="cal-legend-swatch" style="background:var(--seq-250)"></div>
              <div class="cal-legend-swatch" style="background:var(--seq-400)"></div>
              <div class="cal-legend-swatch" style="background:var(--seq-600)"></div>
            </div>
            多い
          </div>
        </div>
        <div id="result-calendar-wrap">
          <div class="cal-weekdays" id="cal-weekdays"></div>
          <div class="cal-grid" id="result-calendar"></div>
          <div class="cal-detail" id="cal-detail"><div class="cal-detail-empty">日付をタップすると内訳が表示されます</div></div>
        </div>
        <div class="result-table-wrap" id="result-table-wrap">
          <table class="result-table">
            <thead>
              <tr><th>日付</th><th class="num">時間</th><th>内訳</th></tr>
            </thead>
            <tbody id="result-table-body"></tbody>
          </table>
        </div>
      </div>
      <div id="result-empty" class="empty-msg" style="display:none">この月の記録はありません</div>
    </div>

    <div class="card">
      <div class="card-title">連続記録</div>
      <div class="result-summary">
        <div class="result-box">
          <div class="val" id="streak-current-val">0</div>
          <div class="lbl">現在の連続日数</div>
        </div>
        <div class="result-box">
          <div class="val" id="streak-best-val">0</div>
          <div class="lbl">自己ベスト</div>
        </div>
      </div>
      <div class="card-title">実績バッジ</div>
      <div class="badge-grid" id="badge-grid"></div>
      <div class="cal-detail" id="badge-detail">バッジをタップすると詳細が表示されます</div>
    </div>

  </div>

</div>

<!-- ボトムナビ -->
<div id="bottom-nav">
  <button class="nav-btn active" onclick="switchTab('days', this)">
    <span class="nav-icon">📅</span>残り日数
  </button>
  <button class="nav-btn" onclick="switchTab('plan', this)">
    <span class="nav-icon">📝</span>勉強計画
  </button>
  <button class="nav-btn" onclick="switchTab('result', this)">
    <span class="nav-icon">📊</span>勉強結果
  </button>
</div>

<div id="toast" role="status" aria-live="polite"></div>

<script>
// ─────────────────────────────────────────
//  データストア
// ─────────────────────────────────────────
let exams = JSON.parse(localStorage.getItem('exams') || '[]');
let plans = migratePlans(JSON.parse(localStorage.getItem('plans') || '{}'));
// plans: { "YYYY-MM-DD": [ { id, start:"06:05", end:"06:45", content:"英語" }, ... ] }

// 旧形式（30分刻みのスロットMap）が残っていた場合、ブロック配列に変換する
function migratePlans(rawPlans) {
  let changed = false;
  const migrated = {};
  Object.entries(rawPlans).forEach(([date, val]) => {
    if (Array.isArray(val)) {
      migrated[date] = val;
      return;
    }
    changed = true;
    const slots = Object.keys(val).sort();
    const blocks = [];
    slots.forEach(slot => {
      const content = val[slot];
      const last = blocks[blocks.length - 1];
      if (last && last.content === content && last.end === slot) {
        last.end = addMinutesToTime(slot, 30);
      } else {
        blocks.push({ id: genId(), start: slot, end: addMinutesToTime(slot, 30), content });
      }
    });
    migrated[date] = blocks;
  });
  if (changed) localStorage.setItem('plans', JSON.stringify(migrated));
  return migrated;
}

// ─────────────────────────────────────────
//  共通ユーティリティ
// ─────────────────────────────────────────
function saveExams() { localStorage.setItem('exams', JSON.stringify(exams)); }
function savePlans() {
  localStorage.setItem('plans', JSON.stringify(plans));
  renderBadges();
}

function toDateStr(dateObj) {
  const y = dateObj.getFullYear();
  const m = String(dateObj.getMonth()+1).padStart(2,'0');
  const d = String(dateObj.getDate()).padStart(2,'0');
  return `${y}-${m}-${d}`;
}

function diffDays(targetDateStr) {
  const today = new Date(); today.setHours(0,0,0,0);
  const target = new Date(targetDateStr); target.setHours(0,0,0,0);
  return Math.ceil((target - today) / (1000*60*60*24));
}

function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }

function toMinutes(hhmm) {
  const [h, m] = hhmm.split(':').map(Number);
  return h * 60 + m;
}

function addMinutesToTime(hhmm, addMin) {
  const total = toMinutes(hhmm) + addMin;
  const h = Math.floor(total / 60), m = total % 60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

// 分数を「1時間30分」のような読みやすい表記に変換
function formatMinutes(min) {
  const h = Math.floor(min / 60), m = min % 60;
  if (h && m) return `${h}時間${m}分`;
  if (h) return `${h}時間`;
  return `${m}分`;
}

// カレンダーの小さいセルに収まる短い表記（例: 1.5h／45m）
function shortDuration(min) {
  const h = min / 60;
  return h >= 1 ? `${Math.round(h * 10) / 10}h` : `${min}m`;
}

// 開始・終了時間が正しい "HH:MM" 形式か（23:59まで、終了のみ24:00も許可）
const TIME_RE = /^([01]\d|2[0-3]):[0-5]\d$/;
function isValidTime(val, allowMidnight) {
  return TIME_RE.test(val) || (allowMidnight && val === '24:00');
}

// 数字だけ入力すれば自動で「HH:MM」に整形する（コロンの入力が不要）
function formatTimeInput(el) {
  const digits = el.value.replace(/\D/g, '').slice(0, 4);
  el.value = digits.length >= 3 ? `${digits.slice(0,2)}:${digits.slice(2)}` : digits;
}

// ─────────────────────────────────────────
//  トースト通知 ／ 入力エラー表示
// ─────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

function markInvalid(el) {
  el.classList.remove('invalid');
  void el.offsetWidth; // アニメーション再生のためリフロー
  el.classList.add('invalid');
  el.addEventListener('animationend', () => el.classList.remove('invalid'), { once: true });
}

// ─────────────────────────────────────────
//  タブ切り替え
// ─────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'result') renderResult();
}

// ─────────────────────────────────────────
//  ① 残り日数
// ─────────────────────────────────────────
function addExam() {
  const nameEl = document.getElementById('exam-name');
  const dateEl = document.getElementById('exam-date');
  const name = nameEl.value.trim();
  const date = dateEl.value;
  if (!name || !date) {
    showToast('テスト名と実施日を入力してください');
    if (!name) markInvalid(nameEl);
    if (!date) markInvalid(dateEl);
    return;
  }
  exams.push({ id: Date.now(), name, date });
  saveExams();
  nameEl.value = '';
  dateEl.value = '';
  renderExams();
  showToast(`「${name}」を登録しました`);
}

function deleteExam(id) {
  exams = exams.filter(e => e.id !== id);
  saveExams();
  renderExams();
}

function renderExams() {
  // 前日までは表示、翌日以降（d < 0）は自動削除
  const before = exams.length;
  exams = exams.filter(e => diffDays(e.date) >= 0);
  if (exams.length !== before) saveExams();

  const el = document.getElementById('exam-list');
  if (exams.length === 0) {
    el.innerHTML = '<div class="empty-msg">まだ登録がありません</div>';
    return;
  }
  // 日付昇順ソート
  const sorted = [...exams].sort((a,b) => a.date.localeCompare(b.date));
  el.innerHTML = sorted.map(e => {
    const d = diffDays(e.date);
    const urgency = d <= 3 ? 'urgent' : d <= 7 ? 'soon' : 'normal';
    return `
      <div class="exam-item urgency-${urgency}">
        <div>
          <div class="exam-name">${escHtml(e.name)}</div>
          <div class="exam-date">${e.date}</div>
        </div>
        <div style="display:flex;align-items:center">
          <div class="exam-days"></div>
          <button class="btn-delete" onclick="deleteExam(${e.id})" title="削除">🗑</button>
        </div>
      </div>`;
  }).join('');

  // 残り日数表示（3日以内は🔥、7日以内は⏰で注意を促す）
  el.querySelectorAll('.exam-days').forEach((el2, i) => {
    const e = sorted[i];
    const d = diffDays(e.date);
    if (d === 0) el2.innerHTML = `当日<span>今日！</span>`;
    else if (d <= 3) el2.innerHTML = `🔥${d}<span>日後</span>`;
    else if (d <= 7) el2.innerHTML = `⏰${d}<span>日後</span>`;
    else el2.innerHTML = `${d}<span>日後</span>`;
  });
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

renderExams();

// ─────────────────────────────────────────
//  ② 勉強計画
// ─────────────────────────────────────────
let currentPlanDate = new Date();

// セレクトボックスにスロット選択肢を設定（5分刻み）
function addPlanBlock() {
  const startEl = document.getElementById('plan-start');
  const endEl = document.getElementById('plan-end');
  const contentEl = document.getElementById('plan-content');
  const startVal = startEl.value;
  const endVal = endEl.value;
  const content = contentEl.value.trim();
  if (!content) { showToast('内容を入力してください'); markInvalid(contentEl); return; }

  // 時刻の形式チェック（HH:MM。終了のみ24:00も可）
  if (!isValidTime(startVal, false) || !isValidTime(endVal, true)) {
    showToast('時間は「06:00」のように入力してください');
    if (!isValidTime(startVal, false)) markInvalid(startEl);
    if (!isValidTime(endVal, true)) markInvalid(endEl);
    return;
  }

  // 開始 < 終了チェック
  if (startVal >= endVal) {
    showToast('終了時間は開始時間より後にしてください');
    markInvalid(startEl);
    markInvalid(endEl);
    return;
  }

  const dateStr = toDateStr(currentPlanDate);
  const existing = plans[dateStr] || [];

  // 時間が重なる既存ブロックは、新しいブロックの範囲を避けて分割・縮小する
  const trimmed = [];
  existing.forEach(b => {
    if (b.end <= startVal || b.start >= endVal) { trimmed.push(b); return; }
    if (b.start < startVal) trimmed.push({ id: genId(), start: b.start, end: startVal, content: b.content });
    if (b.end > endVal) trimmed.push({ id: genId(), start: endVal, end: b.end, content: b.content });
  });
  trimmed.push({ id: genId(), start: startVal, end: endVal, content });
  trimmed.sort((a, b) => a.start.localeCompare(b.start));
  plans[dateStr] = trimmed;

  savePlans();
  contentEl.value = '';
  renderPlan();
  showToast('予定を追加しました');
}

function changeDay(delta) {
  currentPlanDate.setDate(currentPlanDate.getDate() + delta);
  renderPlan();
}

function renderPlan() {
  const dateStr = toDateStr(currentPlanDate);
  const label = currentPlanDate.toLocaleDateString('ja-JP', { year:'numeric', month:'long', day:'numeric', weekday:'short' });
  document.getElementById('plan-date-label').textContent = label;

  // 今日を表示している場合、現在時刻を含むブロックを「現在地」として強調
  const now = new Date();
  const isToday = dateStr === toDateStr(now);
  const nowHHMM = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

  const dayBlocks = (plans[dateStr] || []).slice().sort((a, b) => a.start.localeCompare(b.start));
  const container = document.getElementById('time-slots');

  if (dayBlocks.length === 0) {
    container.innerHTML = '<div class="empty-msg">この日の予定はまだありません</div>';
    return;
  }

  container.innerHTML = dayBlocks.map(b => {
    const nowClass = (isToday && b.start <= nowHHMM && nowHHMM < b.end) ? ' is-now' : '';
    return `
      <div class="time-slot merged${nowClass}">
        <div class="slot-block" tabindex="0" role="button"
          onclick="editBlock('${dateStr}', '${b.id}', this)"
          onkeydown="if(event.key==='Enter'){editBlock('${dateStr}', '${b.id}', this)}">
          <div class="slot-block-main">
            <div class="slot-block-title">${escHtml(b.content)}</div>
            <div class="slot-block-time">${b.start}〜${b.end}</div>
          </div>
          <button type="button" class="slot-block-delete" title="削除"
            onclick="event.stopPropagation(); clearBlock('${dateStr}', '${b.id}')">✕</button>
        </div>
      </div>`;
  }).join('');
}

// ブロックをタップ→インライン編集欄に切り替え
function editBlock(dateStr, id, blockEl) {
  if (blockEl.querySelector('.slot-block-edit')) return; // 編集中は二重起動しない
  const block = (plans[dateStr] || []).find(b => b.id === id);
  if (!block) return;
  const textEl = blockEl.querySelector('.slot-block-title');
  const input = document.createElement('input');
  input.type = 'text';
  input.className = 'slot-block-edit';
  input.value = block.content;
  textEl.replaceWith(input);
  input.focus();
  input.select();

  const commit = () => {
    const val = input.value.trim();
    const list = plans[dateStr] || [];
    const idx = list.findIndex(b => b.id === id);
    if (idx === -1) return;
    if (val) {
      list[idx].content = val;
    } else {
      list.splice(idx, 1);
      if (list.length === 0) delete plans[dateStr];
    }
    savePlans();
    renderPlan();
  };
  input.addEventListener('blur', commit, { once: true });
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') input.blur();
  });
  input.addEventListener('click', (e) => e.stopPropagation());
}

function clearBlock(dateStr, id) {
  const list = plans[dateStr];
  if (!list) return;
  plans[dateStr] = list.filter(b => b.id !== id);
  if (plans[dateStr].length === 0) delete plans[dateStr];
  savePlans();
  renderPlan();
  showToast('予定を削除しました');
}

renderPlan();

// ─────────────────────────────────────────
//  ③ 勉強結果
// ─────────────────────────────────────────
let resultViewDate = new Date();
let resultViewMode = 'calendar'; // 'calendar' | 'table'
const WEEKDAY_LABELS = ['日','月','火','水','木','金','土'];

function changeMonth(delta) {
  resultViewDate.setMonth(resultViewDate.getMonth() + delta);
  renderResult();
}

function toggleResultView() {
  resultViewMode = resultViewMode === 'calendar' ? 'table' : 'calendar';
  renderResult();
}

// 当日の勉強時間を、その月の最大値に対する比率で4段階に振り分け（一色ヒートマップ）
function bucketOf(hours, maxHours) {
  if (!hours) return 0;
  const ratio = hours / maxHours;
  if (ratio <= 0.25) return 1;
  if (ratio <= 0.5) return 2;
  if (ratio <= 0.75) return 3;
  return 4;
}

// 指定日のブロックを内容ごとに集計した内訳（時間が長い順）
function dayBreakdown(dateStr) {
  const blocks = plans[dateStr] || [];
  const byContent = {};
  blocks.forEach(b => {
    const min = toMinutes(b.end) - toMinutes(b.start);
    byContent[b.content] = (byContent[b.content] || 0) + min;
  });
  return Object.entries(byContent).sort((a, b) => b[1] - a[1]);
}

function renderResult() {
  const y = resultViewDate.getFullYear();
  const m = resultViewDate.getMonth(); // 0-indexed
  const mStr = String(m+1).padStart(2,'0');
  document.getElementById('result-month-label').textContent =
    `${y}年 ${m+1}月`;

  // 当月の全日付を収集（日付 → 合計勉強分数）
  const prefix = `${y}-${mStr}`;
  const dayMap = {};

  Object.entries(plans).forEach(([date, blocks]) => {
    if (date.startsWith(prefix) && Array.isArray(blocks) && blocks.length > 0) {
      dayMap[date] = blocks.reduce((s, b) => s + (toMinutes(b.end) - toMinutes(b.start)), 0);
    }
  });

  const dates = Object.keys(dayMap).sort();
  const totalMinutesMonth = dates.reduce((s, d) => s + dayMap[d], 0);

  document.getElementById('month-total-h').textContent = (totalMinutesMonth / 60).toFixed(1);
  document.getElementById('month-total-days').textContent = dates.length;

  const detailWrap = document.getElementById('result-detail-wrap');
  const emptyMsg = document.getElementById('result-empty');
  if (dates.length === 0) {
    detailWrap.style.display = 'none';
    emptyMsg.style.display = 'block';
    return;
  }
  detailWrap.style.display = 'block';
  emptyMsg.style.display = 'none';

  const maxHours = Math.max(...dates.map(d => dayMap[d] / 60));

  // カレンダー／表の表示切替
  const toggleBtn = document.getElementById('result-view-toggle');
  const calWrap = document.getElementById('result-calendar-wrap');
  const tableWrap = document.getElementById('result-table-wrap');
  const legendRow = document.getElementById('cal-legend-row');
  if (resultViewMode === 'table') {
    calWrap.style.display = 'none';
    legendRow.style.display = 'none';
    tableWrap.classList.add('show');
    toggleBtn.textContent = 'カレンダーを見る';
  } else {
    calWrap.style.display = 'block';
    legendRow.style.display = 'flex';
    tableWrap.classList.remove('show');
    toggleBtn.textContent = '表を見る';
  }

  // ── カレンダーヒートマップ ──
  document.getElementById('cal-weekdays').innerHTML =
    WEEKDAY_LABELS.map(w => `<div class="cal-weekday">${w}</div>`).join('');

  const firstWeekday = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m + 1, 0).getDate();
  const todayStr = toDateStr(new Date());

  let cells = '';
  for (let i = 0; i < firstWeekday; i++) {
    cells += `<div class="cal-cell is-blank"></div>`;
  }
  for (let day = 1; day <= daysInMonth; day++) {
    const dateStr = `${prefix}-${String(day).padStart(2,'0')}`;
    const minutes = dayMap[dateStr] || 0;
    const bucket = bucketOf(minutes / 60, maxHours);
    const weekday = WEEKDAY_LABELS[new Date(y, m, day).getDay()];
    const dayLabel = `${m+1}月${day}日(${weekday})`;
    cells += `
      <button type="button" class="cal-cell${bucket ? ' bucket-'+bucket : ''}${dateStr===todayStr ? ' is-today' : ''}"
        onclick="showCalDetail('${dateStr}', '${escHtml(dayLabel)}')" onfocus="showCalDetail('${dateStr}', '${escHtml(dayLabel)}')"
        aria-label="${escHtml(dayLabel)}：${minutes > 0 ? escHtml(formatMinutes(minutes)) : '記録なし'}">
        <span class="cal-day">${day}</span>
        ${minutes > 0 ? `<span class="cal-hours">${shortDuration(minutes)}</span>` : ''}
      </button>`;
  }
  document.getElementById('result-calendar').innerHTML = cells;

  // ── 表（アクセシビリティ用のテーブルビュー：色に依存せず日別の時間と内訳を確認できる） ──
  document.getElementById('result-table-body').innerHTML = dates.map(date => {
    const breakdown = dayBreakdown(date).map(([content, min]) => `${content} ${formatMinutes(min)}`).join('、');
    const d = new Date(date + 'T00:00:00');
    const label = d.toLocaleDateString('ja-JP', { month:'numeric', day:'numeric', weekday:'short' });
    return `<tr><td>${escHtml(label)}</td><td class="num">${escHtml(formatMinutes(dayMap[date]))}</td><td>${escHtml(breakdown)}</td></tr>`;
  }).join('');
}

function showCalDetail(dateStr, dayLabel) {
  const el = document.getElementById('cal-detail');
  const breakdown = dayBreakdown(dateStr);
  if (breakdown.length === 0) {
    el.innerHTML = `<div class="cal-detail-title">${escHtml(dayLabel)}</div><div class="cal-detail-empty">記録なし</div>`;
    return;
  }
  const totalMin = breakdown.reduce((s, [, min]) => s + min, 0);
  const rows = breakdown.map(([content, min]) => `
    <div class="cal-detail-row">
      <span class="cal-detail-name">${escHtml(content)}</span>
      <span class="cal-detail-mins">${escHtml(formatMinutes(min))}</span>
    </div>`).join('');
  el.innerHTML = `
    <div class="cal-detail-title">${escHtml(dayLabel)}・合計 ${escHtml(formatMinutes(totalMin))}</div>
    <div class="cal-detail-breakdown">${rows}</div>`;
}

// ─────────────────────────────────────────
//  連続記録（ストリーク）／ 実績バッジ
// ─────────────────────────────────────────

// 記録がある日付（コマが1つ以上ある日）の一覧
function datesWithRecords() {
  return Object.keys(plans).filter(d => Array.isArray(plans[d]) && plans[d].length > 0);
}

// 現在の連続日数（今日分がまだ無い場合は昨日から数える）と、過去最長の連続日数
function computeStreaks() {
  const recorded = new Set(datesWithRecords());

  let current = 0;
  const cursor = new Date();
  if (!recorded.has(toDateStr(cursor))) cursor.setDate(cursor.getDate() - 1);
  while (recorded.has(toDateStr(cursor))) {
    current++;
    cursor.setDate(cursor.getDate() - 1);
  }

  const sorted = [...recorded].sort();
  let longest = 0, run = 0, prevDate = null;
  sorted.forEach(d => {
    if (prevDate) {
      const diff = Math.round((new Date(d) - new Date(prevDate)) / 86400000);
      run = diff === 1 ? run + 1 : 1;
    } else {
      run = 1;
    }
    longest = Math.max(longest, run);
    prevDate = d;
  });
  longest = Math.max(longest, current);

  return { current, longest };
}

// 累計時間や特徴的な勉強パターンの集計
function computeStudyStats() {
  const dates = datesWithRecords();
  let totalMinutes = 0;
  let perfectDay = false;
  let earlyBird = false;
  let nightOwl = false;
  dates.forEach(d => {
    let dayMinutes = 0;
    plans[d].forEach(b => {
      dayMinutes += toMinutes(b.end) - toMinutes(b.start);
      if (b.start < '07:00') earlyBird = true;
      if (b.end > '22:00') nightOwl = true;
    });
    totalMinutes += dayMinutes;
    if (dayMinutes >= 480) perfectDay = true; // 8時間以上
  });
  return { totalHours: totalMinutes / 60, daysStudied: dates.length, perfectDay, earlyBird, nightOwl };
}

const BADGES = [
  { id:'streak3',    icon:'🔥', name:'3日連続',      desc:'3日連続で勉強を記録した', check: s => s.streak.longest >= 3 },
  { id:'streak7',    icon:'🔥', name:'1週間連続',    desc:'7日連続で勉強を記録した', check: s => s.streak.longest >= 7 },
  { id:'streak14',   icon:'⚡', name:'2週間連続',    desc:'14日連続で勉強を記録した', check: s => s.streak.longest >= 14 },
  { id:'streak30',   icon:'🏆', name:'1ヶ月連続',    desc:'30日連続で勉強を記録した', check: s => s.streak.longest >= 30 },
  { id:'hours10',    icon:'📖', name:'累計10時間',   desc:'合計10時間の勉強を記録した', check: s => s.stats.totalHours >= 10 },
  { id:'hours50',    icon:'📚', name:'累計50時間',   desc:'合計50時間の勉強を記録した', check: s => s.stats.totalHours >= 50 },
  { id:'hours100',   icon:'🎓', name:'累計100時間',  desc:'合計100時間の勉強を記録した', check: s => s.stats.totalHours >= 100 },
  { id:'perfectday', icon:'💯', name:'パーフェクトデイ', desc:'1日8時間以上の勉強を記録した', check: s => s.stats.perfectDay },
  { id:'earlybird',  icon:'🌅', name:'早朝の勉強家', desc:'朝7時より前に勉強を記録した', check: s => s.stats.earlyBird },
  { id:'nightowl',   icon:'🌙', name:'夜型の勉強家', desc:'夜22時以降に勉強を記録した', check: s => s.stats.nightOwl },
];

// 一度解除したバッジは、後で記録を編集・削除しても失われないよう保持する
let earnedBadgeIds = new Set(JSON.parse(localStorage.getItem('earnedBadges') || '[]'));

function renderBadges() {
  const streak = computeStreaks();
  const stats = computeStudyStats();
  const state = { streak, stats };

  let newlyEarned = false;
  BADGES.forEach(b => {
    if (!earnedBadgeIds.has(b.id) && b.check(state)) {
      earnedBadgeIds.add(b.id);
      newlyEarned = true;
    }
  });
  if (newlyEarned) localStorage.setItem('earnedBadges', JSON.stringify([...earnedBadgeIds]));

  const streakChip = document.getElementById('streak-chip');
  const streakCount = document.getElementById('streak-count');
  if (streak.current > 0) {
    streakChip.style.display = 'flex';
    streakCount.textContent = streak.current;
  } else {
    streakChip.style.display = 'none';
  }

  const currentEl = document.getElementById('streak-current-val');
  const bestEl = document.getElementById('streak-best-val');
  if (currentEl) currentEl.textContent = streak.current;
  if (bestEl) bestEl.textContent = streak.longest;

  const gridEl = document.getElementById('badge-grid');
  if (gridEl) {
    gridEl.innerHTML = BADGES.map(b => {
      const earned = earnedBadgeIds.has(b.id);
      return `
        <button type="button" class="badge-cell ${earned ? 'earned' : 'locked'}"
          onclick="showBadgeDetail('${b.id}')" title="${escHtml(b.name)}">${b.icon}</button>`;
    }).join('');
  }
}

function showBadgeDetail(id) {
  const b = BADGES.find(x => x.id === id);
  if (!b) return;
  const earned = earnedBadgeIds.has(id);
  const el = document.getElementById('badge-detail');
  el.textContent = (earned ? '🔓 ' : '🔒 ') + b.name + '：' + b.desc;
}

renderBadges();
</script>
