<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>動詞テスト</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@400;700&family=Klee+One:wght@400;600&family=Yomogi&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FAFAF6;
    --grid:#DCE6E9;
    --ink:#2B2B28;
    --pencil:#6E6E66;
    --ballpoint:#1A3A75;
    --red:#A8281D;
    --red-deep:#7A140C;
    --red-tint:rgba(168,40,29,0.10);
    --gold:#8C6A1F;
  }

  *{box-sizing:border-box;}

  html,body{margin:0;padding:0; overflow-x:hidden; max-width:100%;}

  /* respects the system-level reduce-motion preference everywhere, not just on marks */
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.001ms !important;}
  }

  /* visually hidden but still reachable by screen readers / keyboard */
  .sr-only{
    position:absolute;
    width:1px; height:1px;
    padding:0; margin:-1px;
    overflow:hidden;
    clip:rect(0,0,0,0);
    white-space:nowrap;
    border:0;
  }

  .skip-link{
    position:absolute;
    left:0.5rem; top:-3rem;
    background:var(--ink);
    color:var(--paper);
    padding:0.5rem 0.9rem;
    border-radius:2px;
    font-size:0.85rem;
    z-index:100;
    transition:top .15s ease;
  }
  .skip-link:focus{top:0.5rem;}

  @media (prefers-color-scheme: dark){
    body{background:#15140F;}
    :root{
      --paper:#211F19;
      --grid:#34322A;
      --ink:#EFEDE4;
      --pencil:#A8A498;
      --ballpoint:#9DB6E8;
      --red:#E8736A;
      --red-deep:#FF8C82;
      --red-tint:rgba(232,115,106,0.16);
    }
    #progress-strip{background:rgba(33,31,25,0.92);}
    #sheet{box-shadow:0 1px 0 rgba(0,0,0,0.3), 0 18px 40px -22px rgba(0,0,0,0.6);}
    .dogear{background:linear-gradient(135deg, transparent 49%, #2b2920 50%, #353228 51%, #353228 100%);}
  }

  body{
    background:#E7E2D6;
    background-image:
      radial-gradient(circle at 12% 8%, rgba(0,0,0,0.05), transparent 40%),
      radial-gradient(circle at 88% 92%, rgba(0,0,0,0.04), transparent 45%);
    font-family:'Zen Kaku Gothic New', sans-serif;
    color:var(--ink);
    min-height:100vh;
    padding:2.2rem 1rem 5rem;
  }

  /* ---------- sticky progress strip ---------- */
  #progress-strip{
    position:sticky;
    top:0;
    z-index:50;
    margin:-2.2rem -1rem 1.6rem;
    padding:0.55rem 1rem;
    background:rgba(250,250,246,0.92);
    backdrop-filter:blur(2px);
    border-bottom:1px solid var(--grid);
    display:flex;
    align-items:center;
    justify-content:space-between;
    font-size:0.82rem;
    color:var(--pencil);
  }
  #progress-strip .label{letter-spacing:.04em;}
  #progress-strip .score{
    font-family:'Kaisei Decol', serif;
    color:var(--red);
    font-size:1rem;
  }
  #progress-bar-track{
    position:absolute;
    bottom:-1px;left:0;
    height:2px;
    width:100%;
    background:transparent;
  }
  #progress-bar-fill{
    height:2px;
    width:0%;
    background:var(--red);
    transition:width .4s ease;
  }

  /* ---------- the paper sheet ---------- */
  #sheet{
    max-width:920px;
    margin:0 auto;
    background:var(--paper);
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size:26px 26px;
    background-position:-1px -1px;
    position:relative;
    box-shadow:0 1px 0 rgba(0,0,0,0.05), 0 18px 40px -22px rgba(40,30,10,0.45), 0 2px 4px rgba(40,30,10,0.12);
    padding:3rem clamp(1.2rem, 4vw, 3.2rem) 3.6rem;
  }

  /* staple, top-left, two little grey rectangles crossed */
  #sheet::before{
    content:"";
    position:absolute;
    top:14px; left:34px;
    width:26px; height:9px;
    background:#9A9A92;
    border-radius:1px;
    transform:rotate(38deg);
    box-shadow: 0 0 0 1px rgba(0,0,0,0.08);
  }
  #sheet::after{
    content:"";
    position:absolute;
    top:18px; left:30px;
    width:26px; height:9px;
    background:#B4B4AC;
    border-radius:1px;
    transform:rotate(-12deg);
    box-shadow: 0 0 0 1px rgba(0,0,0,0.06);
  }

  /* dog-eared corner, bottom-right */
  .dogear{
    position:absolute;
    right:0; bottom:0;
    width:46px; height:46px;
    background:linear-gradient(135deg, transparent 49%, #EDEAdc 50%, #fff 51%, #fff 100%);
    box-shadow:-2px -2px 6px rgba(0,0,0,0.08);
    pointer-events:none;
  }

  /* ---------- header ---------- */
  header{
    border-bottom:2px solid var(--ink);
    padding-bottom:1rem;
    margin-bottom:1.8rem;
    position:relative;
  }
  .eyebrow{
    font-size:0.76rem;
    letter-spacing:0.12em;
    color:var(--ballpoint);
    font-weight:700;
  }
  h1{
    font-family:'Klee One', cursive;
    font-weight:600;
    font-size:clamp(1.7rem, 4vw, 2.5rem);
    margin:0.15rem 0 0.6rem;
    color:var(--ink);
  }
  h1 .sub{
    display:inline-block;
    font-size:0.55em;
    color:var(--pencil);
    font-family:'Zen Kaku Gothic New', sans-serif;
    margin-left:0.5rem;
    vertical-align:middle;
  }
  .instructions{
    color:var(--ballpoint);
    font-size:0.95rem;
    line-height:1.7;
    border-left:3px solid var(--ballpoint);
    padding-left:0.7rem;
    margin:0.4rem 0 0.9rem;
  }
  .id-line{
    display:flex;
    flex-wrap:wrap;
    gap:1.6rem;
    font-size:0.85rem;
    color:var(--pencil);
  }
  .id-line span{
    border-bottom:1px dotted var(--pencil);
    padding-bottom:2px;
    min-width:110px;
    display:inline-block;
  }
  .margin-note{
    position:absolute;
    right:-4px; top:-6px;
    font-family:'Yomogi', cursive;
    color:var(--red);
    font-size:1.05rem;
    transform:rotate(-7deg);
    white-space:nowrap;
  }
  .margin-note svg{vertical-align:-6px; margin-left:2px;}

  /* ---------- question grid : two-page-spread feel ---------- */
  #quiz{
    display:grid;
    grid-template-columns:1fr;
    gap:0;
    position:relative;
  }
  @media(min-width:760px){
    #quiz{grid-template-columns:1fr 1fr; column-gap:2.6rem;}
    #quiz::before{
      content:"";
      position:absolute;
      top:0; bottom:0; left:50%;
      width:1px;
      background:linear-gradient(to bottom, transparent, rgba(0,0,0,0.12) 8%, rgba(0,0,0,0.12) 92%, transparent);
      box-shadow:0 0 14px rgba(0,0,0,0.06);
    }
  }

  .q{
    padding:1.1rem 0;
    border-bottom:1px dashed #C9C6B4;
  }
  .q:last-child{border-bottom:none;}

  .q-head{
    display:flex;
    align-items:baseline;
    gap:0.6rem;
    margin-bottom:0.55rem;
  }
  .q-num{
    flex:0 0 auto;
    width:1.9rem; height:1.9rem;
    border:1.5px solid var(--ink);
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:0.82rem;
    font-weight:700;
  }
  .q-word{
    font-family:'Klee One', cursive;
    font-weight:600;
    font-size:1.32rem;
    color:var(--ink);
    background-image:linear-gradient(transparent calc(100% - 5px), var(--ballpoint) 5px);
    background-repeat:no-repeat;
    background-size:0% 100%;
    transition:background-size .5s ease;
    padding-bottom:1px;
  }
  .q.answered .q-word{background-size:100% 100%;}

  fieldset{border:none; margin:0; padding:0;}
  legend{display:block; width:100%; padding:0; margin:0;}

  .choices{margin:0; padding:0;}
  .choice{
    position:relative;
    display:flex;
    align-items:flex-start;
    gap:0.55rem;
    padding:0.5rem 0.4rem;
    min-height:2.75rem;
    margin:0.1rem 0;
    border-radius:3px;
    cursor:pointer;
    font-size:0.93rem;
    line-height:1.55;
    color:var(--ink);
  }
  .choice:hover{background:rgba(31,60,110,0.06);}
  .choice .letter{
    flex:0 0 auto;
    font-weight:700;
    color:var(--pencil);
  }
  .choice input[type="radio"]{
    flex:0 0 auto;
    width:1.05rem; height:1.05rem;
    margin:0.18rem 0 0;
    accent-color:var(--ballpoint);
  }
  .choice input[type="radio"]:focus-visible{
    outline:2px solid var(--ballpoint);
    outline-offset:3px;
  }
  .q.answered .choice{cursor:default;}
  .q.answered .choice:hover{background:transparent;}

  .choice .mark{
    position:absolute;
    left:-4px; top:-10px;
    font-family:'Yomogi', cursive;
    font-size:2.1rem;
    color:var(--red);
    opacity:0;
    pointer-events:none;
    transform:scale(0.5) rotate(0deg);
  }
  .choice.is-correct .mark{
    opacity:1;
    animation:stampCircle .35s ease-out forwards;
  }
  .choice.is-wrong .mark{
    opacity:1;
    color:var(--red-deep);
    animation:stampX .3s ease-out forwards;
  }
  @keyframes stampCircle{
    0%{opacity:0; transform:scale(1.7) rotate(-14deg);}
    70%{opacity:1; transform:scale(0.92) rotate(var(--tilt,-4deg));}
    100%{opacity:1; transform:scale(1) rotate(var(--tilt,-4deg));}
  }
  @keyframes stampX{
    0%{opacity:0; transform:scale(1.5) rotate(10deg);}
    100%{opacity:1; transform:scale(1) rotate(var(--tilt,6deg));}
  }
  .choice.was-correct-answer{
    background:var(--red-tint);
    border-left:3px solid var(--red);
    padding-left:calc(0.4rem - 3px);
    font-weight:700;
    animation:revealCorrect .3s ease-out;
  }
  .choice.was-correct-answer .mark{display:none;}
  .choice .correct-flag{
    flex:0 0 auto;
    margin-left:0.4rem;
    color:var(--red);
    font-weight:700;
    font-family:'Yomogi', cursive;
    font-size:1rem;
    white-space:nowrap;
  }
  @keyframes revealCorrect{
    0%{background:rgba(168,40,29,0.28);}
    100%{background:var(--red-tint);}
  }

  @media (prefers-reduced-motion: reduce){
    .choice .mark{animation:none !important; opacity:1; transform:none;}
    .choice.was-correct-answer{animation:none !important;}
    .q-word{transition:none;}
  }

  /* ---------- results ---------- */
  #results{
    margin-top:2.4rem;
    padding-top:1.6rem;
    border-top:2px solid var(--ink);
    text-align:center;
  }
  #results .placeholder{
    color:var(--pencil);
    font-size:0.92rem;
  }
  .hanko{
    width:118px; height:118px;
    margin:0 auto 0.8rem;
    border:3px double var(--red);
    border-radius:50%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    color:var(--red);
    transform:rotate(-6deg);
    box-shadow:0 0 0 3px rgba(192,57,43,0.05) inset;
  }
  .hanko .num{
    font-family:'Kaisei Decol', serif;
    font-weight:700;
    font-size:2rem;
    line-height:1;
  }
  .hanko .den{
    font-family:'Kaisei Decol', serif;
    font-size:0.85rem;
  }
  #result-message{
    font-family:'Klee One', cursive;
    font-size:1.3rem;
    margin:0.4rem 0 1.1rem;
  }
  #result-rate{
    color:var(--pencil);
    font-size:0.88rem;
    margin:-0.6rem 0 1.3rem;
  }
  #round-size-note{
    color:var(--pencil);
    font-size:0.78rem;
    margin:-0.4rem 0 0.6rem;
  }

  #wrong-list-wrap{
    text-align:left;
    max-width:560px;
    margin:0 auto 1.6rem;
    background:rgba(168,40,29,0.04);
    border:1px solid var(--grid);
    border-radius:4px;
    padding:1rem 1.2rem;
  }
  #wrong-list-heading{
    font-family:'Klee One', cursive;
    font-weight:600;
    font-size:1.05rem;
    margin:0 0 0.6rem;
    color:var(--ink);
  }
  #wrong-list{
    list-style:none;
    margin:0; padding:0;
  }
  #wrong-list li{
    display:flex;
    gap:0.5rem;
    padding:0.32rem 0;
    border-bottom:1px dashed var(--grid);
    font-size:0.92rem;
  }
  #wrong-list li:last-child{border-bottom:none;}
  #wrong-list .w{
    flex:0 0 auto;
    font-family:'Klee One', cursive;
    font-weight:600;
    color:var(--ink);
    min-width:90px;
  }
  #wrong-list .w::before{content:"✕ "; color:var(--red);}
  #wrong-list .m{color:var(--pencil);}

  .retry-buttons{
    display:flex;
    flex-wrap:wrap;
    gap:0.7rem;
    justify-content:center;
  }
  #retry-btn, #retry-wrong-btn{
    font-family:'Zen Kaku Gothic New', sans-serif;
    font-size:0.92rem;
    border:none;
    padding:0.6rem 1.3rem;
    border-radius:2px;
    cursor:pointer;
    letter-spacing:0.03em;
  }
  #retry-btn{color:var(--paper); background:var(--ink);}
  #retry-btn:hover{background:var(--ballpoint);}
  #retry-wrong-btn{color:var(--ink); background:transparent; border:1.5px solid var(--red);}
  #retry-wrong-btn:hover{background:var(--red-tint);}
  #retry-btn:focus-visible, #retry-wrong-btn:focus-visible{outline:2px solid var(--red); outline-offset:2px;}

  footer.note{
    text-align:center;
    color:var(--pencil);
    font-size:0.74rem;
    margin-top:2.4rem;
  }
</style>
</head>
<body>

  <a class="skip-link" href="#quiz">問題へスキップ</a>
  <div id="announcer" class="sr-only" aria-live="polite" role="status"></div>

  <div id="progress-strip">
    <span class="label">解答状況</span>
    <span class="score" id="progress-text">0 / 56</span>
    <div id="progress-bar-track" role="progressbar" aria-label="解答の進捗" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"><div id="progress-bar-fill"></div></div>
  </div>

  <div id="sheet">
    <div class="dogear" aria-hidden="true"></div>

    <header>
      <span class="margin-note" aria-hidden="true">がんばって！
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M9 10c0-.3 1-1 1.5-1s1.5.7 1.5 1M14 10c0-.3 1-1 1.5-1s1.5.7 1.5 1M8.5 14.5c1 1.2 2.2 1.8 3.5 1.8s2.5-.6 3.5-1.8" stroke-linecap="round"/></svg>
      </span>
      <div class="eyebrow">英語コミュニケーションⅢ</div>
      <h1>動詞テスト<span class="sub">選択肢シャッフル版</span></h1>
      <p class="instructions" id="instructions">次の英単語の意味として最も適切なものをア〜エから選びなさい。選ぶと、その場で採点されます。</p>
      <div class="id-line">
        <span>クラス：&nbsp;</span>
        <span>出席番号：&nbsp;</span>
        <span>氏名：&nbsp;</span>
      </div>
    </header>

    <div id="quiz" aria-label="問題一覧"></div>

    <div id="results">
      <p class="placeholder" id="results-placeholder">全問解答すると、ここに結果が表示されます。</p>
      <div id="results-content" role="status" style="display:none;">
        <div class="hanko"><span class="num" id="final-score">0</span><span class="den">／<span id="final-total">56</span></span></div>
        <p id="result-message"></p>
        <p id="result-rate"></p>
        <p id="round-size-note"></p>
        <div id="wrong-list-wrap" style="display:none;">
          <h2 id="wrong-list-heading">間違えた単語</h2>
          <ul id="wrong-list"></ul>
        </div>
        <div class="retry-buttons">
          <button id="retry-btn">選択肢をシャッフルしてもう一度</button>
          <button id="retry-wrong-btn">間違えた単語のみもう一度</button>
        </div>
      </div>
    </div>

    <footer class="note">「動詞テスト.pdf」の出題内容をもとに作成。選択肢の並びと出題順は毎回ランダムです。</footer>
  </div>

<script>
(function(){
  "use strict";

  var VOCAB = [
    ["grow","成長する・増大する","growth"],
    ["guess","推測する・言い当てる","mind"],
    ["guide","案内する・道案内する","lead"],
    ["hand","手渡す","possess"],
    ["happen","起こる・偶然〜する","time"],
    ["have","所有する・持っている","possess"],
    ["head","向かう・率いる・先頭に立つ","lead"],
    ["hear","聞こえる","sense"],
    ["help","手伝う・助ける・救う","enable"],
    ["hit","打つ・命中する","move"],
    ["hold","手に持つ・保有する・持ちこたえる","possess"],
    ["hope","望む・希望する","feel"],
    ["hurry","急がせる・急いでする","time"],
    ["introduce","紹介する・教える・導入する","social"],
    ["invite","招く・招待する","social"],
    ["jump","跳ぶ・急騰する","move"],
    ["keep","保つ・持ち続ける・続ける","possess"],
    ["kick","蹴る","move"],
    ["kiss","口づけする","feel"],
    ["knock","ノックする","move"],
    ["know","知っている・理解している","mind"],
    ["land","着陸する・到着する・着陸させる","arrive"],
    ["laugh","笑う","feel"],
    ["lead","導く・案内する・率いる・先導する","lead"],
    ["learn","習得する・覚える・できるようになる","mind"],
    ["leave","去る・出発する・辞める・残す","arrive"],
    ["lend","貸す","possess"],
    ["let","させてやる・することを許す","social"],
    ["lie①","うそをつく","deceive"],
    ["lie②","横たわる・位置する","arrive"],
    ["lift","持ち上げる","move"],
    ["like","好む","feel"],
    ["listen","耳を傾ける・聴く","sense"],
    ["live","住む・生存する・暮らす","arrive"],
    ["look","見る・注視する・〜に見える","sense"],
    ["love","愛している・大好きである","feel"],
    ["mean","意味する・〜のつもりで言う","mind"],
    ["meet","会う・接触する・条件に合う","social"],
    ["miss","打ち損なう・機会を逃す・寂しく思う","feel"],
    ["move","移動させる・感動させる・動く","move"],
    ["need","必要がある・必要とする","value"],
    ["notice","気づく・わかる","mind"],
    ["open","開ける・開く・始める","make"],
    ["paint","絵を描く・ペンキを塗る","make"],
    ["pass","通り過ぎる・通過する・時間を過ごす","arrive"],
    ["pay","支払う・注意を払う","value"],
    ["pick","選ぶ・摘み取る","move"],
    ["play","遊ぶ・試合をする・演奏する","make"],
    ["prepare","準備する・準備させる","enable"],
    ["promise","約束する","social"],
    ["pull","引く・引っ張る・引き抜く","move"],
    ["push","押す・押し出す","move"],
    ["put","置く・状態にする・させる","make"],
    ["raise","上げる・育てる・集める","growth"],
    ["reach","着く・到着する・届く・達する","arrive"],
    ["read","読む・読んで理解する","mind"]
  ];

  // ---- distractor-quality helpers ----
  // 1) words are grouped into semantic "tag" clusters above, so wrong choices
  //    can be drawn from the same conceptual neighbourhood (harder, more
  //    realistic distractors) instead of being picked completely at random.
  // 2) hasSep() flags whether a meaning is written as a single short phrase
  //    or a multi-part "A・B・C" definition. A question never mixes the two
  //    styles, so the punctuation itself can't give the answer away.
  // 3) EXCLUDE is built automatically by checking whether two different
  //    words' definitions literally share an identical sub-phrase (e.g.
  //    guide/lead both say "案内する") — such pairs are too close in
  //    meaning to use as a fair distractor for each other, so they are
  //    barred from ever appearing together.
  var BY_WORD = {};
  VOCAB.forEach(function(v){ BY_WORD[v[0]] = {meaning:v[1], tag:v[2]}; });

  function hasSep(s){ return s.indexOf("・") !== -1; }

  function splitParts(s){ return s.split(/[・、]/).filter(Boolean); }

  var EXCLUDE = {};
  VOCAB.forEach(function(v){ EXCLUDE[v[0]] = {}; });
  (function(){
    var phraseToWords = {};
    VOCAB.forEach(function(v){
      splitParts(v[1]).forEach(function(p){
        if(!phraseToWords[p]) phraseToWords[p] = [];
        phraseToWords[p].push(v[0]);
      });
    });
    Object.keys(phraseToWords).forEach(function(phrase){
      var words = phraseToWords[phrase];
      if(words.length > 1){
        words.forEach(function(w1){
          words.forEach(function(w2){
            if(w1 !== w2) EXCLUDE[w1][w2] = true;
          });
        });
      }
    });
  })();

  var LETTERS = ["ア","イ","ウ","エ"];
  var TOTAL = VOCAB.length;
  var correctCount = 0;
  var answeredCount = 0;
  var wrongAnswers = [];       // [[word, meaning], ...] mistakes made in the round just finished
  var lastRoundWasFull = true; // was the round just finished the full 56-word set?

  function shuffle(arr){
    var a = arr.slice();
    for(var i=a.length-1; i>0; i--){
      var j = Math.floor(Math.random()*(i+1));
      var t=a[i]; a[i]=a[j]; a[j]=t;
    }
    return a;
  }

  function randomTilt(min,max){
    return (Math.random()*(max-min)+min).toFixed(1)+"deg";
  }

  function buildQuiz(sourceList){
    var list = sourceList || VOCAB;
    lastRoundWasFull = (list === VOCAB);
    TOTAL = list.length;

    var quizEl = document.getElementById("quiz");
    quizEl.innerHTML = "";
    correctCount = 0;
    answeredCount = 0;
    wrongAnswers = [];
    document.getElementById("announcer").textContent = "";
    updateProgress();
    document.getElementById("results-placeholder").style.display = "block";
    document.getElementById("results-content").style.display = "none";

    var order = shuffle(list.map(function(_,i){return i;}));

    order.forEach(function(localIndex, displayIndex){
      var word = list[localIndex][0];
      var meta = BY_WORD[word];
      var meaning = meta.meaning;
      var tag = meta.tag;
      var correctSep = hasSep(meaning);

      var candidatePool = VOCAB.filter(function(v){
        return v[0] !== word && hasSep(v[1]) === correctSep && !EXCLUDE[word][v[0]];
      });
      var sameTagPool = shuffle(candidatePool.filter(function(v){ return v[2] === tag; }));
      var chosen = sameTagPool.slice(0,3);
      if(chosen.length < 3){
        var remainingPool = shuffle(candidatePool.filter(function(v){ return chosen.indexOf(v) === -1; }));
        chosen = chosen.concat(remainingPool.slice(0, 3 - chosen.length));
      }
      var distractors = chosen.map(function(v){ return v[1]; });
      var choiceTexts = shuffle([meaning].concat(distractors));
      var correctLetterIdx = choiceTexts.indexOf(meaning);
      var groupName = "q" + displayIndex;

      var qSet = document.createElement("fieldset");
      qSet.className = "q";
      qSet.dataset.correctIdx = correctLetterIdx;
      qSet.setAttribute("aria-describedby", "instructions");

      var legend = document.createElement("legend");
      legend.className = "q-head";
      var num = document.createElement("span");
      num.className = "q-num";
      num.setAttribute("aria-hidden", "true");
      num.textContent = (displayIndex+1);
      var w = document.createElement("span");
      w.className = "q-word";
      w.lang = "en";
      w.textContent = word;
      legend.appendChild(num);
      legend.appendChild(w);
      qSet.appendChild(legend);

      var choicesWrap = document.createElement("div");
      choicesWrap.className = "choices";

      choiceTexts.forEach(function(text, idx){
        var label = document.createElement("label");
        label.className = "choice";

        var input = document.createElement("input");
        input.type = "radio";
        input.name = groupName;
        input.value = idx;
        input.id = groupName + "-c" + idx;

        var letterSpan = document.createElement("span");
        letterSpan.className = "letter";
        letterSpan.setAttribute("aria-hidden", "true");
        letterSpan.textContent = LETTERS[idx] + "．";

        var textSpan = document.createElement("span");
        textSpan.textContent = text;

        var markSpan = document.createElement("span");
        markSpan.className = "mark";
        markSpan.setAttribute("aria-hidden", "true");

        label.appendChild(input);
        label.appendChild(letterSpan);
        label.appendChild(textSpan);
        label.appendChild(markSpan);

        input.addEventListener("change", function(){
          handleAnswer(qSet, idx, correctLetterIdx, word, meaning, choiceTexts);
        });

        choicesWrap.appendChild(label);
      });

      qSet.appendChild(choicesWrap);
      quizEl.appendChild(qSet);
    });
  }

  function handleAnswer(qSet, chosenIdx, correctIdx, word, meaning, choiceTexts){
    if(qSet.classList.contains("answered")) return;
    qSet.classList.add("answered");
    answeredCount++;

    var labels = qSet.querySelectorAll(".choice");
    var isCorrect = (chosenIdx === correctIdx);
    if(isCorrect){
      correctCount++;
    } else {
      wrongAnswers.push([word, meaning]);
    }

    labels.forEach(function(label){
      var input = label.querySelector("input[type='radio']");
      var idx = parseInt(input.value, 10);
      var mark = label.querySelector(".mark");
      input.disabled = true;

      if(idx === chosenIdx){
        mark.style.setProperty("--tilt", randomTilt(-8,8));
        if(isCorrect){
          label.classList.add("is-correct");
          mark.textContent = "○";
        } else {
          label.classList.add("is-wrong");
          mark.textContent = "✕";
        }
      } else if(idx === correctIdx && !isCorrect){
        label.classList.add("was-correct-answer");
        var flag = document.createElement("span");
        flag.className = "correct-flag";
        flag.setAttribute("aria-hidden", "true");
        flag.textContent = "← 正解";
        label.appendChild(flag);
      }
    });

    var announcer = document.getElementById("announcer");
    if(isCorrect){
      announcer.textContent = word + "は正解です。";
    } else {
      announcer.textContent = word + "は不正解です。正しい意味は「" + meaning + "」です。";
    }

    updateProgress();

    if(answeredCount === TOTAL){
      showResults();
    }
  }

  function updateProgress(){
    document.getElementById("progress-text").textContent = correctCount + " / " + TOTAL;
    var pct = Math.round((answeredCount/TOTAL)*100);
    document.getElementById("progress-bar-fill").style.width = pct + "%";
    document.getElementById("progress-bar-track").setAttribute("aria-valuenow", pct);
  }

  function showResults(){
    document.getElementById("results-placeholder").style.display = "none";
    var content = document.getElementById("results-content");
    content.style.display = "block";
    document.getElementById("final-score").textContent = correctCount;
    document.getElementById("final-total").textContent = TOTAL;

    var pct = Math.round((correctCount/TOTAL)*100);
    var msg;
    if(pct === 100){
      msg = "満点！ お見事です。";
    } else if(pct >= 90){
      msg = "素晴らしい！ あと一歩で満点です。";
    } else if(pct >= 70){
      msg = "よくできました。間違えた単語をもう一度確認しよう。";
    } else if(pct >= 50){
      msg = "もう少し！ ◯がついた単語を見直そう。";
    } else {
      msg = "復習が必要です。教科書を見直してみよう。";
    }
    document.getElementById("result-message").textContent = msg;
    document.getElementById("result-rate").textContent = "正答率：" + pct + "%";

    var roundNote = document.getElementById("round-size-note");
    roundNote.textContent = lastRoundWasFull ? "" : ("前回間違えた" + TOTAL + "問の復習ラウンドです。");

    var wrongWrap = document.getElementById("wrong-list-wrap");
    var wrongUl = document.getElementById("wrong-list");
    wrongUl.innerHTML = "";
    if(wrongAnswers.length > 0){
      wrongWrap.style.display = "block";
      wrongAnswers.forEach(function(pair){
        var li = document.createElement("li");
        var ws = document.createElement("span");
        ws.className = "w";
        ws.lang = "en";
        ws.textContent = pair[0];
        var ms = document.createElement("span");
        ms.className = "m";
        ms.textContent = pair[1];
        li.appendChild(ws);
        li.appendChild(ms);
        wrongUl.appendChild(li);
      });
    } else {
      wrongWrap.style.display = "none";
    }

    var retryWrongBtn = document.getElementById("retry-wrong-btn");
    if(wrongAnswers.length > 0){
      retryWrongBtn.style.display = "inline-block";
      retryWrongBtn.textContent = "間違えた" + wrongAnswers.length + "問のみもう一度";
    } else {
      retryWrongBtn.style.display = "none";
    }
  }

  document.getElementById("retry-btn").addEventListener("click", function(){
    buildQuiz(VOCAB);
    window.scrollTo({top:0, behavior:"smooth"});
  });

  document.getElementById("retry-wrong-btn").addEventListener("click", function(){
    if(wrongAnswers.length === 0) return;
    var subset = wrongAnswers.slice();
    buildQuiz(subset);
    window.scrollTo({top:0, behavior:"smooth"});
  });

  buildQuiz(VOCAB);
})();
</script>
</body>
</html>
