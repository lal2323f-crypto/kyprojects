<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>英コⅢ 単語テスト</title>
<style>
/* ── reset ─────────────────────────────── */
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{min-height:100vh;font-family:"Hiragino Sans","Yu Gothic","Noto Sans JP",system-ui,sans-serif}

/* ════════════════════════════════════════
   DISNEY THEME  (hub + lesson screens)
   ════════════════════════════════════════ */
.lt{
  min-height:100vh;
  background:#07091c;
  font-family:"Hiragino Mincho ProN","Yu Mincho","Noto Serif JP","Hiragino Sans",system-ui,sans-serif;
  position:relative;
  color:#f0ece0;
}

/* starfield layer 1 – cool white */
.lt::before{
  content:'';
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    radial-gradient(circle 1.5px at center,rgba(255,255,255,.92) 0%,transparent 100%),
    radial-gradient(circle 1px at center,rgba(255,255,255,.65) 0%,transparent 100%),
    radial-gradient(circle .5px at center,rgba(255,255,255,.4) 0%,transparent 100%);
  background-size:179px 211px, 97px 131px, 61px 79px;
  background-position:23px 41px, 11px 67px, 7px 19px;
}

/* starfield layer 2 – warm gold twinkling */
.lt::after{
  content:'';
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    radial-gradient(circle 1px at center,rgba(255,220,100,.7) 0%,transparent 100%),
    radial-gradient(circle .5px at center,rgba(255,248,180,.5) 0%,transparent 100%);
  background-size:233px 257px, 113px 151px;
  background-position:54px 93px, 31px 47px;
  animation:twinkle 3.5s ease-in-out infinite alternate;
}
@keyframes twinkle{0%{opacity:.5}100%{opacity:1}}

.lt>*{position:relative;z-index:1}

/* ── header ── */
.lt-hd{
  background:linear-gradient(170deg,#121958 0%,#0e1440 40%,#07091c 100%);
  padding:20px 18px 0;
  text-align:center;
  position:relative;
  overflow:hidden;
}
/* ambient glow behind castle */
.lt-hd::before{
  content:'';
  position:absolute;left:50%;top:35%;
  transform:translateX(-50%);
  width:260px;height:180px;
  background:radial-gradient(ellipse,rgba(212,168,67,.13) 0%,transparent 70%);
  pointer-events:none;
}

.lt-back-btn{
  display:inline-flex;align-items:center;gap:5px;
  background:transparent;
  border:1px solid rgba(212,168,67,.38);
  border-radius:20px;
  color:rgba(212,168,67,.85);
  padding:6px 14px;font-size:13px;
  cursor:pointer;font-family:inherit;
  margin-bottom:16px;float:left;clear:left;
}
.lt-back-btn:hover{border-color:#d4a843;color:#d4a843}

.lt-hd-inner{clear:both;padding-bottom:0}
.lt-ey{
  font-size:11px;letter-spacing:.1em;
  color:rgba(212,168,67,.6);
  text-transform:uppercase;margin-bottom:8px;
}
.lt-ttl{
  font-size:30px;font-weight:800;letter-spacing:.04em;line-height:1.2;
  background:linear-gradient(135deg,#f9ee80 0%,#d4a843 35%,#f9ee80 65%,#c8911e 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  margin-bottom:6px;
}
/* deco stars line */
.lt-deco{color:rgba(212,168,67,.55);font-size:14px;letter-spacing:.4em;padding:6px 0 0}

/* ── body ── */
.lt-body{padding:24px 16px 60px}
.lt-lbl{
  font-size:12px;color:rgba(212,168,67,.5);
  letter-spacing:.05em;
  padding-bottom:12px;
  border-bottom:1px solid rgba(212,168,67,.15);
  margin-bottom:20px;
}

/* ── cards ── */
.lcard{
  display:flex;align-items:center;gap:10px;
  background:rgba(14,20,72,.7);
  border:1px solid rgba(212,168,67,.28);
  border-radius:14px;
  padding:18px 16px 18px 20px;
  margin-bottom:14px;width:100%;text-align:left;
  cursor:pointer;font-family:inherit;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  box-shadow:0 2px 14px rgba(0,0,0,.5);
  transition:border-color .2s,box-shadow .2s,transform .1s;
}
.lcard:hover,.lcard:focus-visible{
  border-color:rgba(212,168,67,.65);
  box-shadow:0 4px 24px rgba(0,0,0,.55),0 0 22px rgba(212,168,67,.1);
}
.lcard:active{transform:scale(.99)}
.lcard:focus-visible{outline:2px solid rgba(212,168,67,.6);outline-offset:2px}
.lc-body{flex:1;min-width:0}
.lc-ey{font-size:11px;color:rgba(212,168,67,.5);margin-bottom:5px;letter-spacing:.02em}
.lc-ttl{font-size:17px;font-weight:700;color:#d4a843;margin-bottom:5px;line-height:1.3}
.lc-desc{font-size:12.5px;color:rgba(255,255,255,.42);line-height:1.5}
.lc-arr{font-size:22px;color:rgba(212,168,67,.5);flex:0 0 auto}

/* ════════════════════════════════════════
   QUIZ SCREEN – Disney starfield theme
   ════════════════════════════════════════ */
.dk{
  min-height:100vh;
  background:#07091c;
  color:#f0ece0;
  font-family:"Hiragino Mincho ProN","Yu Mincho","Noto Serif JP","Hiragino Sans",system-ui,sans-serif;
  position:relative;
}
/* starfield – same layers as hub */
.dk::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    radial-gradient(circle 1.5px at center,rgba(255,255,255,.92) 0%,transparent 100%),
    radial-gradient(circle 1px at center,rgba(255,255,255,.65) 0%,transparent 100%),
    radial-gradient(circle .5px at center,rgba(255,255,255,.4) 0%,transparent 100%);
  background-size:179px 211px,97px 131px,61px 79px;
  background-position:23px 41px,11px 67px,7px 19px;
}
.dk::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    radial-gradient(circle 1px at center,rgba(255,220,100,.7) 0%,transparent 100%),
    radial-gradient(circle .5px at center,rgba(255,248,180,.5) 0%,transparent 100%);
  background-size:233px 257px,113px 151px;
  background-position:54px 93px,31px 47px;
  animation:twinkle 3.5s ease-in-out infinite alternate;
}
.dk>*{position:relative;z-index:1}

/* sticky status bar */
.qbar{
  position:sticky;top:0;z-index:20;
  background:rgba(8,10,35,.92);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(212,168,67,.22);
  color:#f0ece0;
  display:flex;align-items:center;
  padding:11px 14px;gap:10px;
}
.qbar-back{
  display:inline-flex;align-items:center;gap:4px;
  background:transparent;
  border:1px solid rgba(212,168,67,.4);
  border-radius:20px;
  color:rgba(212,168,67,.85);
  padding:5px 12px;font-size:12.5px;font-weight:600;
  cursor:pointer;font-family:inherit;white-space:nowrap;flex:0 0 auto;
}
.qbar-back:hover{border-color:#d4a843;color:#d4a843}
.qbar-back:focus-visible{outline:2px solid #d4a843;outline-offset:2px}
.qbar-mid{flex:1;font-size:12.5px;color:rgba(255,255,255,.6);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.qbar-cnt{white-space:nowrap;flex:0 0 auto;font-size:14px;font-weight:600;color:rgba(255,255,255,.8)}
.qbar-cnt .n{font-family:"Courier New",monospace;color:#e8594c;font-weight:700}
.mtag{font-size:11px;color:#d4a843;border:1px solid rgba(212,168,67,.45);border-radius:4px;padding:2px 6px;font-weight:600}

/* quiz content area */
.qwrap{max-width:560px;margin:0 auto;padding:22px 20px 60px;position:relative;z-index:1}

/* ── intro ── */
.qi-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.qi-left{display:flex;align-items:center;gap:10px}
.qi-icon{width:28px;height:28px;opacity:.7;transform:rotate(-8deg);flex:0 0 auto;color:#d4a843}
.qi-sub{color:#d4a843;font-size:13px;font-weight:600;letter-spacing:.02em}
.qi-cheer{color:#f9ee80;font-size:16px;font-weight:700;transform:rotate(-3deg);white-space:nowrap;text-shadow:0 0 12px rgba(212,168,67,.6)}
.qi-trow{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin:6px 0 14px}
.qi-trow h2{
  font-size:24px;font-weight:800;letter-spacing:.02em;
  background:linear-gradient(135deg,#f9ee80 0%,#d4a843 35%,#f9ee80 65%,#c8911e 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.qi-tsub{font-size:13px;color:rgba(212,168,67,.55)}
.qi-instr{display:flex;gap:10px;color:rgba(212,168,67,.8);font-size:13.5px;line-height:1.85;margin-bottom:22px}
.qi-bar{flex:0 0 auto;width:3px;background:#d4a843;border-radius:2px;opacity:.6}
.qi-frow{display:flex;gap:20px;font-size:13px;color:rgba(212,168,67,.5);margin-bottom:12px;flex-wrap:wrap}
.qi-frow.full{margin-bottom:0}
.qi-fp{display:inline-flex;align-items:baseline;gap:6px;white-space:nowrap}
.qi-dots{
  display:inline-block;width:90px;height:1px;
  background-image:repeating-linear-gradient(90deg,rgba(212,168,67,.3) 0 4px,transparent 4px 8px);
}
.qi-frow.full .qi-dots{width:190px}
.qi-rule{height:1px;background:linear-gradient(90deg,transparent,rgba(212,168,67,.4),transparent);margin:20px 0 26px}

/* ── question blocks ── */
.qblk{margin-bottom:28px}
.qhd{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.qcirc{
  width:34px;height:34px;border-radius:50%;
  border:1.5px solid rgba(212,168,67,.5);
  display:flex;align-items:center;justify-content:center;
  font-family:"Courier New",monospace;font-size:14px;
  color:rgba(212,168,67,.8);flex:0 0 auto;
}
.qwd{
  font-family:"Chalkboard SE","Comic Sans MS","Segoe Print",cursive;
  font-size:27px;color:#f9ee80;word-break:break-word;
  text-shadow:0 0 18px rgba(212,168,67,.25);
}

/* ── choice buttons ── */
.choice{
  display:flex;align-items:center;gap:14px;
  padding:13px 12px;cursor:pointer;
  border:none;border-left:3px solid transparent;
  background:rgba(14,20,72,.45);
  width:100%;text-align:left;
  font-family:inherit;border-radius:10px;
  margin-bottom:8px;
  transition:background .15s,border-color .15s;
}
.choice:hover:not(.locked){background:rgba(14,20,72,.75);border-left-color:rgba(212,168,67,.4)}
.choice:focus-visible{outline:2px solid rgba(212,168,67,.6);outline-offset:2px}
.choice.locked{cursor:default}
/* correct pick – green */
.choice.cp{background:rgba(94,207,148,.18);border-left-color:#5ecf94}
.choice.cp .mn{color:#5ecf94;font-weight:700}
/* wrong pick – red */
.choice.wp{background:rgba(232,89,76,.18);border-left-color:#e8594c}
.choice.wp .mn{color:#e8594c;font-weight:700}
/* reveal correct answer */
.choice.rv{background:rgba(94,207,148,.08);border-left-color:rgba(94,207,148,.5)}
.choice.rv .mn{color:#5ecf94}

/* radio circles */
.radio{flex:0 0 auto;width:22px;height:22px;border-radius:50%;border:1.6px solid rgba(212,168,67,.38);position:relative}
.radio.ok{border-color:#5ecf94}
.radio.ok::after,.radio.ng::after{content:"";position:absolute;top:4px;left:4px;right:4px;bottom:4px;border-radius:50%}
.radio.ok::after{background:#5ecf94}
.radio.ng{border-color:#e8594c}
.radio.ng::after{background:#e8594c}

.kana{font-size:15px;color:rgba(212,168,67,.65);flex:0 0 auto;width:26px}
.mn{font-size:15.5px;color:#f0ece0;flex:1 1 auto}

/* badges */
.badge{flex:0 0 auto;display:inline-flex;align-items:center;padding:5px 11px;border-radius:999px;font-size:12px;font-weight:700;white-space:nowrap}
.badge.bc{background:#5ecf94;color:#0d2417}
.badge.bw{background:#e8594c;color:#2b0c08}
.badge.br{background:transparent;border:1.3px solid rgba(94,207,148,.55);color:#5ecf94}
.hidden{display:none!important}

/* dividers between questions */
.qdiv{margin-top:20px;border:none;border-top:1px dashed rgba(212,168,67,.14)}

/* ── results ── */
.qfooter{margin:30px 0 18px;min-height:30px}
.ph{color:rgba(212,168,67,.45);font-size:13.5px;text-align:center}
.sc-wrap{text-align:center;margin-bottom:28px;padding:20px 0}
.sc-big{
  font-family:"Courier New",monospace;font-size:48px;
  background:linear-gradient(135deg,#f9ee80,#d4a843);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.sc-den{font-family:"Courier New",monospace;font-size:20px;color:rgba(212,168,67,.6)}
.sc-pct{font-size:14px;color:rgba(212,168,67,.55);margin-top:6px;letter-spacing:.05em}
.sec-ttl{
  font-size:13.5px;font-weight:700;
  color:rgba(212,168,67,.6);
  border-bottom:1px dashed rgba(212,168,67,.2);
  padding-bottom:8px;margin:24px 0 12px;
  letter-spacing:.03em;
}
.wi{display:flex;justify-content:space-between;gap:12px;font-size:13.5px;padding:8px 0;border-bottom:1px dashed rgba(212,168,67,.08)}
.wi .ww{font-family:"Chalkboard SE","Comic Sans MS",cursive;color:#f0ece0;white-space:nowrap}
.wi .wm{color:#e8594c;text-align:right}
.allok{text-align:center;color:#5ecf94;font-size:14px;padding:8px 0 16px;letter-spacing:.02em}
.rbrow{display:flex;flex-direction:column;gap:10px;margin:20px 0}
.rbtn{display:block;width:100%;padding:15px 20px;font-family:inherit;font-size:14px;cursor:pointer;border-radius:10px;font-weight:700;text-align:center;letter-spacing:.02em}
.rbtn.prim{background:linear-gradient(135deg,#d4a843,#c8911e);color:#07091c;border:none;box-shadow:0 2px 12px rgba(212,168,67,.25)}
.rbtn.sec{background:transparent;color:#d4a843;border:1px solid rgba(212,168,67,.35)}
.rbtn:hover{opacity:.9}
.rbtn:focus-visible{outline:2px solid #d4a843;outline-offset:2px}

/* growth record table */
.gtt{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:12px}
.gtt th{color:rgba(212,168,67,.6);font-weight:600;padding:6px 4px;border-bottom:1px solid rgba(212,168,67,.18);text-align:center}
.gtt td{color:#f0ece0;padding:7px 4px;border-bottom:1px dashed rgba(212,168,67,.08);text-align:center}
.gtt td.up{color:#5ecf94}.gtt td.dn{color:#e8594c}.gtt td.nt{color:rgba(212,168,67,.5)}
.g-empty{color:rgba(212,168,67,.3);font-size:13px;text-align:center;padding:12px 0}
.rst-btn{background:transparent;color:#e8594c;border:1px solid rgba(232,89,76,.4);font-family:inherit;font-size:13px;padding:8px 18px;cursor:pointer;border-radius:8px;margin-top:8px}
.byline{text-align:center;color:rgba(212,168,67,.25);font-size:11.5px;line-height:1.7;margin-top:26px}
@media(prefers-reduced-motion:no-preference){.radio.ok::after,.radio.ng::after{animation:pop .15s ease}}
@keyframes pop{from{transform:scale(.3)}to{transform:scale(1)}}

/* ════ CELEBRATION OVERLAY ════ */
.cel-ov{position:fixed;inset:0;z-index:300;overflow:hidden;background:linear-gradient(180deg,#050816 0%,#0a1235 45%,#060e28 100%)}
.cel-canvas{position:absolute;inset:0;pointer-events:none}
/* stars layer */
.cel-stars{position:absolute;inset:0;pointer-events:none;
  background-image:
    radial-gradient(circle 1.5px at center,rgba(255,255,255,.95) 0%,transparent 100%),
    radial-gradient(circle 1px at center,rgba(255,255,255,.7) 0%,transparent 100%),
    radial-gradient(circle .5px at center,rgba(255,245,160,.55) 0%,transparent 100%);
  background-size:173px 197px,97px 137px,59px 83px;
  background-position:23px 41px,11px 67px,7px 19px;
  animation:cel-star-twinkle 3s ease-in-out infinite alternate}
@keyframes cel-star-twinkle{0%{opacity:.55}100%{opacity:1}}
/* header content */
.cel-hd{position:absolute;top:0;left:0;right:0;padding:52px 20px 0;text-align:center;z-index:10}
.cel-crown{font-size:48px;animation:cel-bounce .9s cubic-bezier(.34,1.56,.64,1) .2s both;display:block}
@keyframes cel-bounce{from{opacity:0;transform:scale(.2) rotate(-20deg)}to{opacity:1;transform:scale(1) rotate(0)}}
.cel-label{font-size:11px;letter-spacing:.35em;color:rgba(212,168,67,.65);text-transform:uppercase;margin:10px 0 4px;animation:cel-rise .6s ease .5s both}
.cel-score{font-family:"Courier New",monospace;font-size:72px;line-height:1;
  background:linear-gradient(135deg,#fff5b0 0%,#d4a843 40%,#f9ee80 65%,#c8911e 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:cel-rise .6s ease .7s both,cel-pulse 2.4s ease-in-out 1.6s infinite;
  filter:drop-shadow(0 0 14px rgba(212,168,67,.5))}
@keyframes cel-pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
.cel-den{font-family:"Courier New",monospace;font-size:20px;color:rgba(212,168,67,.55);vertical-align:middle}
.cel-congrats{font-size:22px;font-weight:800;color:#f9ee80;letter-spacing:.06em;margin:8px 0 4px;
  animation:cel-rise .6s ease .9s both;text-shadow:0 0 24px rgba(212,168,67,.6)}
.cel-sub{font-size:13px;color:rgba(212,168,67,.55);letter-spacing:.08em;animation:cel-rise .6s ease 1.0s both}
@keyframes cel-rise{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
/* glow */
.cel-glow{position:absolute;left:50%;transform:translateX(-50%);
  width:380px;height:280px;pointer-events:none;z-index:6;
  background:radial-gradient(ellipse at 50% 100%,rgba(212,168,67,.2) 0%,rgba(141,182,230,.1) 40%,transparent 70%);
  animation:cel-glow-breathe 3.5s ease-in-out infinite}
@keyframes cel-glow-breathe{0%,100%{opacity:.6;transform:translateX(-50%) scale(1)}50%{opacity:1;transform:translateX(-50%) scale(1.12)}}
/* castle */
.cel-castle-wrap{position:absolute;bottom:-8px;left:-6%;right:-6%;display:flex;justify-content:center;z-index:8;
  animation:cel-castle-rise 1.4s cubic-bezier(.16,1,.3,1) .3s both;
  filter:drop-shadow(0 -10px 50px rgba(141,182,230,.28)) drop-shadow(0 0 30px rgba(212,168,67,.22))}
@keyframes cel-castle-rise{from{opacity:0;transform:translateY(90px)}to{opacity:1;transform:translateY(0)}}
.cel-castle-img{width:112%;max-width:580px;display:block}
/* button */
.cel-btn-wrap{position:absolute;z-index:20;left:0;right:0;display:flex;flex-direction:column;align-items:center;gap:10px;animation:cel-rise .6s ease 1.7s both}
.cel-main-btn{background:linear-gradient(135deg,#d4a843 0%,#f9ee80 50%,#d4a843 100%);background-size:200% 100%;
  color:#07091c;border:none;border-radius:999px;padding:15px 38px;
  font-size:15px;font-weight:800;font-family:inherit;cursor:pointer;letter-spacing:.05em;
  box-shadow:0 4px 28px rgba(212,168,67,.5);animation:cel-shimmer 3s linear 2.5s infinite}
@keyframes cel-shimmer{0%{background-position:0% 0}50%{background-position:100% 0}100%{background-position:0% 0}}
.cel-sec-btn{background:transparent;border:1px solid rgba(212,168,67,.35);color:rgba(212,168,67,.8);
  border-radius:999px;padding:10px 28px;font-size:13px;font-family:inherit;cursor:pointer}

</style>
</head>
<body>
<div id="app"></div>
<script>
(function(){
"use strict";

/* ════════════════════════════════════════
   VOCABULARY  (add L7, L8 here later)
   ════════════════════════════════════════ */
var VOCAB = {
  L6:[
    // Part 1
    {p:1,w:"group",             pos:"名",m:"集団・グループ"},
    {p:1,w:"farmer",            pos:"名",m:"農民・農家"},
    {p:1,w:"dig",               pos:"動",m:"掘る"},
    {p:1,w:"well",              pos:"名",m:"井戸"},
    {p:1,w:"suddenly",          pos:"副",m:"突然・急に"},
    {p:1,w:"life-size",         pos:"形",m:"等身大の"},
    {p:1,w:"warrior",           pos:"名",m:"戦士・兵士"},
    {p:1,w:"army",              pos:"名",m:"軍隊"},
    {p:1,w:"thousand",          pos:"名",m:"千"},
    {p:1,w:"terracotta warrior",pos:"名",m:"兵馬俑（へいばよう）"},
    {p:1,w:"create",            pos:"動",m:"作る・創造する"},
    {p:1,w:"tomb",              pos:"名",m:"墓・陵墓"},
    {p:1,w:"emperor",           pos:"名",m:"皇帝"},
    {p:1,w:"include",           pos:"動",m:"含む"},
    {p:1,w:"different",         pos:"形",m:"異なる・様々な"},
    {p:1,w:"clothing",          pos:"名",m:"衣服・衣類"},
    {p:1,w:"hairstyle",         pos:"名",m:"髪型"},
    {p:1,w:"facial",            pos:"形",m:"顔の"},
    {p:1,w:"expression",        pos:"名",m:"表情・表現"},
    {p:1,w:"exactly",           pos:"副",m:"正確に・まさに"},

var KANA = ["ア","イ","ウ","エ"];

function shuffle(a){
  a=a.slice();
  for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}
  return a;
}
function distractors(item, pool){
  var same=pool.filter(function(d){return d.pos===item.pos&&d.m!==item.m;});
  var diff=pool.filter(function(d){return d.pos!==item.pos&&d.m!==item.m;});
  var c=shuffle(same);
  if(c.length<3) c=c.concat(shuffle(diff));
  return c.slice(0,3).map(function(d){return d.m;});
}
function fmtDate(d){return (d.getMonth()+1)+'/'+d.getDate();}
function loadHist(key){try{var r=localStorage.getItem(key);return r?JSON.parse(r):[];}catch(e){return [];}}
function saveHist(key,rec){try{var h=loadHist(key);h.push(rec);localStorage.setItem(key,JSON.stringify(h));}catch(e){}}
function clearHist(key){try{localStorage.removeItem(key);}catch(e){}}

function buildQs(data, pool){
  return shuffle(data).map(function(item){
    var opts=shuffle([item.m].concat(distractors(item,pool)));
    return {item:item, opts:opts, answered:false};
  });
}

function buildQBlock(q, qi, les, part, wrongOnly, wrongSet){
  var blk=mk('div','qblk');
  var hd=mk('div','qhd');
  var ci=mk('div','qcirc');ci.textContent=qi+1;
  var wd=mk('div','qwd');wd.textContent=q.item.w;
  hd.appendChild(ci);hd.appendChild(wd);blk.appendChild(hd);

  q.opts.forEach(function(optText,oi){
    var row=mk('button','choice');
    row.type='button';row.dataset.t=optText;
    var rd=mk('span','radio');
    var kn=mk('span','kana');kn.textContent=KANA[oi]+'．';
    var mn=mk('span','mn');mn.textContent=optText;
    var bg=mk('span','badge hidden');
    row.appendChild(rd);row.appendChild(kn);row.appendChild(mn);row.appendChild(bg);
    row.onclick=function(){onAnswer(q,qi,row,rd,bg,optText,les,part,wrongOnly);};
    blk.appendChild(row);
  });

  if(qi<QS.qs.length-1){var hr=document.createElement('hr');hr.className='qdiv';blk.appendChild(hr);}
  return blk;
}

function onAnswer(q,qi,row,rd,bg,opt,les,part,wrongOnly){
  if(q.answered) return;
  q.answered=true;
  QS.answered++;
  document.getElementById('qaC').textContent=QS.answered;

  var ok=(opt===q.item.m);
  var blk=row.closest('.qblk');
  blk.querySelectorAll('.choice').forEach(function(r){r.classList.add('locked');});

  if(ok){
    QS.score++;
    rd.classList.add('ok');row.classList.add('cp');
    bg.classList.remove('hidden');bg.classList.add('bc');bg.textContent='○ 正解';
  } else {
    rd.classList.add('ng');row.classList.add('wp');
    bg.classList.remove('hidden');bg.classList.add('bw');bg.textContent='✕ 不正解';
    QS.wrong.push(q.item);
    blk.querySelectorAll('.choice').forEach(function(r){
      if(r.dataset.t===q.item.m){
        r.classList.add('rv');
        var b=r.querySelector('.badge');b.classList.remove('hidden');b.classList.add('br');b.textContent='○ 正解';
      }
    });
  }
  if(QS.answered>=QS.qs.length) showResults(les,part,wrongOnly);
}

function showResults(les,part,wrongOnly){
  document.getElementById('qph').classList.add('hidden');
  var res=document.getElementById('qres');
  res.classList.remove('hidden');res.innerHTML='';

  var total=QS.qs.length;
  var pct=Math.round(QS.score/total*100);

  var sw=mk('div','sc-wrap');
  sw.innerHTML='<div><span class="sc-big">'+QS.score+'</span><span class="sc-den"> ／ '+total+'</span></div><div class="sc-pct">正答率　'+pct+'%</div>';
  res.appendChild(sw);

  var wttl=mk('div','sec-ttl');wttl.textContent='間違えた単語';res.appendChild(wttl);
  if(QS.wrong.length===0){
    var ok=mk('div','allok');ok.textContent='✨ 全問正解！ ✨';res.appendChild(ok);
    setTimeout(function(){showCelebration(QS.score,total,les,part,wrongOnly);},600);
  } else {
    QS.wrong.forEach(function(item){
      var wi=mk('div','wi');
      wi.innerHTML='<span class="ww">'+item.w+'</span><span class="wm">'+item.m+'</span>';
      res.appendChild(wi);
    });
  }

  /* retry buttons */
  var rr=mk('div','rbrow');
  var b1=mk('button','rbtn prim');
  b1.textContent='選択肢をシャッフルしてもう一度';
  (function(snap){
    b1.onclick=function(){$app.innerHTML='';renderQuiz(les,part,wrongOnly,wrongOnly?snap:null);window.scrollTo(0,0);};
  })(QS.currentSet.slice());
  rr.appendChild(b1);
  if(QS.wrong.length>0){
    var wrongSnap=QS.wrong.slice();
    var b2=mk('button','rbtn sec');
    b2.textContent='間違えた単語のみもう一度（'+wrongSnap.length+'問）';
    b2.onclick=function(){$app.innerHTML='';renderQuiz(les,part,true,wrongSnap);window.scrollTo(0,0);};
    rr.appendChild(b2);
  }
  res.appendChild(rr);

  /* save history (full runs only) */
  if(!wrongOnly){
    saveHist('TQ_'+part.id,{date:fmtDate(new Date()),score:QS.score,total:total,pct:pct});
  }

  /* growth table */
  var gt=mk('div','sec-ttl');gt.textContent='成長記録';res.appendChild(gt);
  var gWrap=mk('div');gWrap.id='gWrap';gWrap.appendChild(buildGrowth(part.id));res.appendChild(gWrap);
  var rb=mk('button','rst-btn');rb.textContent='記録をリセット';
  rb.onclick=function(){clearHist('TQ_'+part.id);document.getElementById('gWrap').innerHTML='';document.getElementById('gWrap').appendChild(buildGrowth(part.id));};
  res.appendChild(rb);
}

function buildGrowth(partId){
  var h=loadHist('TQ_'+partId);
  var wrap=mk('div');
  if(h.length===0){var em=mk('div','g-empty');em.textContent='まだ記録がありません';wrap.appendChild(em);return wrap;}
  var tbl=mk('table','gtt');
  tbl.innerHTML='<thead><tr><th>回</th><th>日付</th><th>正解数</th><th>正答率</th><th>前回比</th></tr></thead>';
  var tb=document.createElement('tbody');
  h.forEach(function(r,i){
    var diff='-',cls='nt';
    if(i>0){var d=r.pct-h[i-1].pct;diff=(d>=0?'+':'')+d+'%';cls=d>0?'up':d<0?'dn':'nt';}
    var tr=document.createElement('tr');
    tr.innerHTML='<td>'+(i+1)+'</td><td>'+r.date+'</td><td>'+r.score+' / '+r.total+'</td><td>'+r.pct+'%</td><td class="'+cls+'">'+diff+'</td>';
    tb.appendChild(tr);
  });
  tbl.appendChild(tb);wrap.appendChild(tbl);return wrap;
}

function mk(tag,cls){var e=document.createElement(tag);if(cls)e.className=cls;return e;}

function mkCard(eyebrow,title,desc,onclick){
  var c=mk('button','lcard');
  var bd=mk('div','lc-body');
  var ey=mk('div','lc-ey');ey.textContent=eyebrow;
  var ttl=mk('div','lc-ttl');ttl.textContent=title;
  var ds=mk('div','lc-desc');ds.textContent=desc;
  bd.appendChild(ey);bd.appendChild(ttl);bd.appendChild(ds);
  var arr=mk('div','lc-arr');arr.textContent='›';
  c.appendChild(bd);c.appendChild(arr);
  c.onclick=onclick;
  return c;
}

/* ════ FIREWORKS ════ */
function launchFireworks(canvas){
  var ctx=canvas.getContext('2d');
  var W=canvas.width=window.innerWidth;
  var H=canvas.height=window.innerHeight;
  var parts=[];
  var COLS=['#d4a843','#f9ee80','#ffffff','#8fb6e6','#5ecf94','#ffd700','#ffffff','#ffe87c'];

  function burst(x,y,n){
    n=n||60;
    for(var i=0;i<n;i++){
      var a=(Math.PI*2*i/n)+Math.random()*.4;
      var spd=2.5+Math.random()*5;
      parts.push({
        x:x,y:y,
        vx:Math.cos(a)*spd, vy:Math.sin(a)*spd,
        alpha:1, color:COLS[Math.floor(Math.random()*COLS.length)],
        size:1.5+Math.random()*2.5,
        g:0.07+Math.random()*.06,
        d:0.011+Math.random()*.014
      });
    }
  }
  function sparkle(x,y){
    var gold=Math.random()<.6;
    parts.push({
      x:x,y:y,
      vx:(Math.random()-.5)*4, vy:-(1.5+Math.random()*5),
      alpha:1, color:gold?'#f9ee80':'#ffffff',
      size:2+Math.random()*3,
      g:.05, d:.012+Math.random()*.01, star:true
    });
  }
  function starShape(x,y,r,col,a){
    ctx.globalAlpha=a;ctx.fillStyle=col;
    ctx.beginPath();
    for(var i=0;i<8;i++){
      var rad=i%2===0?r:r*.4;
      var ang=(i/8)*Math.PI*2-Math.PI/2;
      i===0?ctx.moveTo(x+rad*Math.cos(ang),y+rad*Math.sin(ang)):ctx.lineTo(x+rad*Math.cos(ang),y+rad*Math.sin(ang));
    }
    ctx.closePath();ctx.fill();
  }

  var alive=true;
  function tick(){
    if(!alive)return;
    ctx.clearRect(0,0,W,H);
    for(var i=parts.length-1;i>=0;i--){
      var p=parts[i];
      p.x+=p.vx; p.y+=p.vy; p.vy+=p.g; p.vx*=.98; p.alpha-=p.d;
      if(p.alpha<=0){parts.splice(i,1);continue;}
      if(p.star){starShape(p.x,p.y,p.size*(0.4+p.alpha*.6),p.color,p.alpha);}
      else{
        ctx.globalAlpha=p.alpha;ctx.fillStyle=p.color;
        ctx.beginPath();ctx.arc(p.x,p.y,p.size*(0.3+p.alpha*.7),0,Math.PI*2);ctx.fill();
      }
    }
    ctx.globalAlpha=1;
    requestAnimationFrame(tick);
  }
  tick();

  // schedule
  var sched=[
    [0,.5,.35,70],[350,.25,.28,65],[650,.75,.32,70],
    [1000,.5,.22,85],[1300,.3,.38,65],[1550,.7,.26,70],
    [1900,.5,.32,80],[2200,.2,.28,65],[2500,.8,.35,70],
    [2800,.5,.28,90],[3100,.35,.38,70],[3400,.65,.25,70],
    [3800,.5,.3,75],[4100,.3,.28,65],[4200,.7,.28,65],[4300,.5,.2,75]
  ];
  sched.forEach(function(s){
    setTimeout(function(){
      burst(W*s[1],H*s[2],s[3]);
      for(var k=0;k<6;k++) setTimeout(function(){sparkle(Math.random()*W,Math.random()*H*.4);},k*120);
    },s[0]);
  });
  return function(){alive=false;ctx.clearRect(0,0,W,H);};
}

/* ════ CELEBRATION ════ */
function showCelebration(score,total,les,part,wrongOnly){
  var ov=mk('div','cel-ov');
  // fireworks canvas
  var canvas=document.createElement('canvas');
  canvas.className='cel-canvas';
  ov.appendChild(canvas);
  // star background
  var stars=mk('div','cel-stars');ov.appendChild(stars);
  // glow behind castle (position dynamically later)
  var glow=mk('div','cel-glow');ov.appendChild(glow);
  // castle
  var cw=mk('div','cel-castle-wrap');
  var ci=mk('img','cel-castle-img');
  ci.src=CASTLE_IMG;ci.alt='シンデレラ城';
  cw.appendChild(ci);ov.appendChild(cw);
  // header content
  var hd=mk('div','cel-hd');
  var crown=mk('span','cel-crown');crown.textContent='👑';
  var lbl=mk('div','cel-label');lbl.textContent='✦ PERFECT ✦';
  var sc=mk('div','cel-score');
  sc.innerHTML=score+'<span class="cel-den"> / '+total+'</span>';
  var cong=mk('div','cel-congrats');cong.textContent='全問正解！';
  var sub=mk('div','cel-sub');sub.textContent='おめでとう！✨　素晴らしい！';
  hd.appendChild(crown);hd.appendChild(lbl);hd.appendChild(sc);hd.appendChild(cong);hd.appendChild(sub);
  ov.appendChild(hd);
  // buttons – positioned above the castle
  var bwrap=mk('div','cel-btn-wrap');
  // Position buttons to sit just above the castle (bottom 42%)
  bwrap.style.bottom='42%';
  var b1=mk('button','cel-main-btn');
  b1.textContent='もう一度挑戦する 🎉';
  b1.onclick=function(){stop();$app.innerHTML='';renderQuiz(les,part,wrongOnly,wrongOnly?QS.currentSet:null);window.scrollTo(0,0);};
  var b2=mk('button','cel-sec-btn');
  b2.textContent='結果を閉じる';
  b2.onclick=function(){stop();ov.remove();};
  bwrap.appendChild(b1);bwrap.appendChild(b2);
  ov.appendChild(bwrap);
  // tap anywhere to dismiss (except buttons)
  ov.addEventListener('click',function(e){
    if(!e.target.closest('button')){stop();ov.remove();}
  });
  document.body.appendChild(ov);
  var stop=launchFireworks(canvas);
}


go('hub');

})();
</script>
